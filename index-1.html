const fmt = (n) => `रु.${Number(n || 0).toLocaleString('en-IN')}`;

const fmtDate = (ts) => {
  if (!ts) return '';
  try {
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: '2-digit' });
  } catch { return ''; }
};

const isToday = (ts) => {
  if (!ts) return false;
  try {
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    const n = new Date();
    return d.getDate() === n.getDate() && d.getMonth() === n.getMonth() && d.getFullYear() === n.getFullYear();
  } catch { return false; }
};

const withinDays = (ts, days) => {
  if (!ts) return false;
  try {
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return (Date.now() - d.getTime()) <= days * 864e5;
  } catch { return false; }
};

const sameMonth = (ts) => {
  if (!ts) return false;
  try {
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    const n = new Date();
    return d.getMonth() === n.getMonth() && d.getFullYear() === n.getFullYear();
  } catch { return false; }
};

// ─── AUTH SCREEN ──────────────────────────────────────────────────────────────
const AuthScreen = () => {
  const [tab, setTab]       = useState('login');
  const [email, setEmail]   = useState('');
  const [pass, setPass]     = useState('');
  const [name, setName]     = useState('');
  const [err, setErr]       = useState('');
  const [busy, setBusy]     = useState(false);
  const [lang, setLang]     = useState('ne');
  const t = L[lang];

  const go = async () => {
    setErr(''); setBusy(true);
    try {
      if (tab === 'login') {
        await auth.signInWithEmailAndPassword(email.trim(), pass);
      } else {
        if (!name.trim()) { setErr('Name required'); setBusy(false); return; }
        const c = await auth.createUserWithEmailAndPassword(email.trim(), pass);
        await db.collection('users').doc(c.user.uid).set({ name: name.trim(), email: email.trim(), createdAt: TS() });
      }
    } catch(e) {
      setErr(e.code === 'auth/user-not-found' || e.code === 'auth/wrong-password' ? 'Invalid email or password'
           : e.code === 'auth/email-already-in-use' ? 'Email already registered'
           : e.code === 'auth/weak-password' ? 'Password too short (min 6)'
           : e.message);
    }
    setBusy(false);
  };

  return (
    <div style={{minHeight:'100vh', background:'linear-gradient(160deg, #14532d 0%, #166534 40%, #15803d 70%, #4ade80 130%)'}}
      className="flex flex-col items-center justify-center p-4">
      
      <div className="w-full max-w-sm">
        {/* Logo */}
        <div className="text-center mb-7">
          <div className="w-20 h-20 bg-white rounded-3xl flex items-center justify-center mx-auto mb-4 shadow-2xl" style={{boxShadow:'0 20px 60px rgba(0,0,0,0.25)'}}>
            <span style={{fontSize:40}}>🛒</span>
          </div>
          <h1 style={{fontSize:32, fontWeight:800, letterSpacing:-0.5}} className="text-white">{t.app}</h1>
          <p className="text-green-200 text-sm mt-1 font-medium">{t.tagline}</p>
        </div>

        {/* Lang */}
        <div className="flex justify-center mb-4">
          <button onClick={() => setLang(lang==='ne'?'en':'ne')}
            className="bg-white bg-opacity-15 text-white text-sm font-semibold px-5 py-1.5 rounded-full border border-white border-opacity-30">
            {t.langBtn}
          </button>
        </div>

        {/* Card */}
        <div className="bg-white rounded-3xl shadow-2xl overflow-hidden" style={{boxShadow:'0 30px 80px rgba(0,0,0,0.3)'}}>
          {/* Tabs */}
          <div className="flex bg-gray-50">
            {['login','register'].map(tp => (
              <button key={tp} onClick={() => { setTab(tp); setErr(''); }}
                className="flex-1 py-4 font-bold text-sm transition-all"
                style={{color: tab===tp ? '#15803d' : '#9ca3af', borderBottom: tab===tp ? '3px solid #15803d' : '3px solid transparent'}}>
                {tp === 'login' ? t.login : t.register}
              </button>
            ))}
          </div>

          <div className="p-6 space-y-3">
            {tab === 'register' && (
              <input value={name} onChange={e=>setName(e.target.value)}
                placeholder={t.fullname} className="inp" />
            )}
            <input value={email} onChange={e=>setEmail(e.target.value)}
              placeholder={t.email} type="email" className="inp" />
            <input value={pass} onChange={e=>setPass(e.target.value)}
              placeholder={t.password} type="password" className="inp"
              onKeyDown={e => e.key==='Enter' && go()} />

            {err && <div className="bg-red-50 text-red-600 text-xs rounded-xl px-4 py-2 font-medium">{err}</div>}

            <button onClick={go} disabled={busy} className="btn-primary mt-1">
              {busy ? '...' : (tab==='login' ? t.loginBtn : t.regBtn)}
            </button>

            <p onClick={() => { setTab(tab==='login'?'register':'login'); setErr(''); }}
              className="text-center text-xs text-green-700 font-semibold cursor-pointer py-1">
              {tab==='login' ? t.noAcc : t.hasAcc}
            </p>
          </div>
        </div>
      </div>
    </div>
  );
};

// ─── SHOP SETUP ───────────────────────────────────────────────────────────────
const ShopSetup = ({ user, onDone, lang }) => {
  const [mode, setMode]     = useState(null);
  const [sName, setSName]   = useState('');
  const [code, setCode]     = useState('');
  const [err, setErr]       = useState('');
  const [busy, setBusy]     = useState(false);
  const t = L[lang];

  const create = async () => {
    if (!sName.trim()) return setErr('Shop name required');
    setBusy(true); setErr('');
    try {
      const shopCode = genCode();
      const ref = await db.collection('shops').add({
        name: sName.trim(), code: shopCode,
        ownerId: user.uid, members: [user.uid], createdAt: TS(),
      });
      await db.collection('users').doc(user.uid).set({ shopId: ref.id }, { merge: true });
      onDone(ref.id);
    } catch(e) { setErr(e.message); }
    setBusy(false);
  };

  const join = async () => {
    if (!code.trim()) return setErr('Enter shop code');
    setBusy(true); setErr('');
    try {
      const snap = await db.collection('shops').where('code','==', code.trim().toUpperCase()).get();
      if (snap.empty) { setErr('Shop not found. Check the code.'); setBusy(false); return; }
      const doc = snap.docs[0];
      await doc.ref.update({ members: ARR_UNION(user.uid) });
      await db.collection('users').doc(user.uid).set({ shopId: doc.id }, { merge: true });
      onDone(doc.id);
    } catch(e) { setErr(e.message); }
    setBusy(false);
  };

  return (
    <div style={{minHeight:'100vh', background:'linear-gradient(160deg, #14532d, #16a34a)'}}
      className="flex flex-col items-center justify-center p-4">
      <div className="w-full max-w-sm">
        <div className="text-center mb-6">
          <span style={{fontSize:56}}>🏪</span>
          <h2 className="text-2xl font-bold text-white mt-2">
            {!mode ? 'पसल सेटअप' : mode==='create' ? t.createShop : t.joinShop}
          </h2>
        </div>
        <div className="bg-white rounded-3xl p-6 shadow-2xl">
          {!mode ? (
            <div className="space-y-3">
              <button onClick={() => setMode('create')} className="btn-primary text-left flex items-center gap-3" style={{textAlign:'left'}}>
                <span style={{fontSize:24}}>🆕</span> {t.createShop}
              </button>
              <button onClick={() => setMode('join')} className="btn-outline flex items-center gap-3">
                <span style={{fontSize:24}}>🔗</span> {t.joinShop}
              </button>
            </div>
          ) : mode==='create' ? (
            <div className="space-y-3">
              <input value={sName} onChange={e=>setSName(e.target.value)}
                placeholder={t.shopName} className="inp" onKeyDown={e=>e.key==='Enter'&&create()} />
              {err && <p className="text-red-500 text-sm font-medium">{err}</p>}
              <div className="grid grid-cols-2 gap-3">
                <button onClick={() => setMode(null)} className="btn-outline">{t.cancel}</button>
                <button onClick={create} disabled={busy} className="btn-primary">{busy?'...':t.create}</button>
              </div>
            </div>
          ) : (
            <div className="space-y-3">
              <p className="text-gray-500 text-sm text-center">{t.joinCode}</p>
              <input value={code} onChange={e=>setCode(e.target.value.toUpperCase())}
                placeholder="XXXXXX" className="inp text-center font-bold"
                style={{letterSpacing:6, fontSize:20}} maxLength={6}
                onKeyDown={e=>e.key==='Enter'&&join()} />
              {err && <p className="text-red-500 text-sm font-medium text-center">{err}</p>}
              <div className="grid grid-cols-2 gap-3">
                <button onClick={() => setMode(null)} className="btn-outline">{t.cancel}</button>
                <button onClick={join} disabled={busy} className="btn-primary">{busy?'...':t.join}</button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

          <p className="text-2xl font-bold tracking-widest">{shopData?.code}</p>

// ─── TRANSACTIONS ─────────────────────────────────────────────────────────────
const Transactions = ({ shopId, t }) => {
  const [txs, setTxs]         = useState([]);
  const [products, setProducts] = useState([]);
  const [custs, setCusts]     = useState([]);
  const [filter, setFilter]   = useState('all');
  const [modal, setModal]     = useState(false);
  const [busy, setBusy]       = useState(false);
  const blank = {type:'sale',amount:'',desc:'',prodId:'',qty:'1',custId:'',creditSale:false};
  const [f, setF] = useState(blank);

  useEffect(() => {
    const u1 = db.collection(`shops/${shopId}/transactions`).orderBy('createdAt','desc').limit(80)
      .onSnapshot(s=>setTxs(s.docs.map(d=>({id:d.id,...d.data()}))));
    const u2 = db.collection(`shops/${shopId}/inventory`).orderBy('name')
      .onSnapshot(s=>setProducts(s.docs.map(d=>({id:d.id,...d.data()}))));
    const u3 = db.collection(`shops/${shopId}/customers`).orderBy('name')
      .onSnapshot(s=>setCusts(s.docs.map(d=>({id:d.id,...d.data()}))));
    return ()=>{ u1(); u2(); u3(); };
  }, [shopId]);

  const filtered = filter==='all' ? txs : txs.filter(x=>x.type===filter);

  const save = async () => {
    if (!f.amount) return;
    setBusy(true);
    const amt = parseFloat(f.amount);
    const qty = parseFloat(f.qty)||1;
    const data = {type:f.type,amount:amt,description:f.desc||t[f.type],productId:f.prodId||null,quantity:qty,customerId:(f.type==='sale'&&f.creditSale&&f.custId)?f.custId:null,createdAt:TS()};
    const batch = db.batch();
    batch.set(db.collection(`shops/${shopId}/transactions`).doc(), data);

    // Update stock
    if (f.prodId) {
      const delta = f.type==='sale'?-qty:f.type==='purchase'?qty:0;
      if (delta!==0) batch.update(db.collection(`shops/${shopId}/inventory`).doc(f.prodId), {stock:INC(delta)});
    }

    // Credit sale → update customer balance + ledger
    if (f.type==='sale' && f.creditSale && f.custId) {
      batch.update(db.collection(`shops/${shopId}/customers`).doc(f.custId), {balance:INC(amt)});
      batch.set(db.collection(`shops/${shopId}/ledger`).doc(), {customerId:f.custId,type:'credit',amount:amt,description:f.desc||'Sale on credit',createdAt:TS()});
    }

    await batch.commit();
    setBusy(false); setModal(false); setF(blank);
  };

  const typeStyle = { sale:{bg:'bg-green-100',text:'text-green-700',icon:'💰'}, purchase:{bg:'bg-blue-100',text:'text-blue-700',icon:'📦'}, expense:{bg:'bg-red-100',text:'text-red-700',icon:'💸'} };

  return (
    <div className="p-4 fade-in">
      <div className="flex items-center justify-between mb-4">
        <h1 className="text-xl font-bold text-gray-800">{t.transactions}</h1>
        <button onClick={()=>{setF(blank);setModal(true);}} className="flex items-center gap-1.5 bg-green-600 text-white text-sm font-bold px-4 py-2 rounded-xl">
          <Ic n="plus" s={15} c="#fff" /> {t.add}
        </button>
      </div>

      <div className="flex gap-2 mb-4 overflow-x-auto pb-1">
        {['all','sale','purchase','expense'].map(v=>(
          <button key={v} onClick={()=>setFilter(v)}
            className={`px-4 py-2 rounded-xl text-sm font-bold whitespace-nowrap flex-shrink-0 ${filter===v?'bg-green-600 text-white':'bg-white text-gray-600'}`}>
            {v==='all'?'All':t[v]}
          </button>
        ))}
      </div>

      <div className="space-y-2">
        {filtered.map(tx => {
          const prod = products.find(p=>p.id===tx.productId);
          const cust = custs.find(c=>c.id===tx.customerId);
          const s = typeStyle[tx.type];
          return (
            <div key={tx.id} className="card flex items-center gap-3">
              <div className={`w-9 h-9 rounded-xl flex items-center justify-center flex-shrink-0 ${s.bg}`}>{s.icon}</div>
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2">
                  <p className="font-semibold text-gray-800 text-sm truncate">{tx.description}</p>
                  <span className={`tag ${s.bg} ${s.text}`}>{t[tx.type]}</span>
                </div>
                <p className="text-xs text-gray-400 mt-0.5">
                  {prod?`${prod.name}×${tx.quantity} · `:''}
                  {cust?`${cust.name} · `:''}
                  {fmtDate(tx.createdAt)}
                </p>
              </div>
              <p className={`font-bold text-sm flex-shrink-0 ${tx.type==='sale'?'text-green-600':'text-red-500'}`}>
                {tx.type==='sale'?'+':'-'}{fmt(tx.amount)}
              </p>
            </div>
          );
        })}
        {filtered.length===0 && <div className="text-center py-12 text-gray-400"><p className="text-4xl mb-2">💳</p><p>{t.noData}</p></div>}
      </div>

      {modal && (
        <Modal onClose={()=>setModal(false)} title={t.addTx}>
          {/* Type */}
          <div className="flex gap-2 mb-4">
            {['sale','purchase','expense'].map(tp=>(
              <button key={tp} onClick={()=>setF({...f,type:tp})}
                className={`flex-1 py-2.5 rounded-xl text-sm font-bold ${f.type===tp?
                  (tp==='sale'?'bg-green-600 text-white':tp==='purchase'?'bg-blue-600 text-white':'bg-red-600 text-white')
                  :'bg-gray-100 text-gray-600'}`}>
                {t[tp]}
              </button>
            ))}
          </div>
          <div className="space-y-3">
            <input value={f.amount} onChange={e=>setF({...f,amount:e.target.value})} type="number" placeholder={t.amount} className="inp" />
            <input value={f.desc} onChange={e=>setF({...f,desc:e.target.value})} placeholder={t.desc} className="inp" />

            <select value={f.prodId} onChange={e=>{
              const p=products.find(pr=>pr.id===e.target.value);
              setF({...f,prodId:e.target.value,amount:p?String(p.sellPrice):f.amount,desc:p?p.name:f.desc});
            }} className="inp pr-8">
              <option value="">{t.selectProd}</option>
              {products.map(p=><option key={p.id} value={p.id}>{p.name} ({p.stock} {t[p.unit]})</option>)}
            </select>

            {f.prodId && (
              <input value={f.qty} onChange={e=>{
                const q=parseFloat(e.target.value)||1;
                const p=products.find(pr=>pr.id===f.prodId);
                setF({...f,qty:e.target.value,amount:p?String(p.sellPrice*q):f.amount});
              }} type="number" placeholder={t.qty} min="1" className="inp" />
            )}

            {f.type==='sale' && (
              <>
                <label className="flex items-center gap-3 cursor-pointer">
                  <div onClick={()=>setF({...f,creditSale:!f.creditSale})}
                    className={`w-12 h-6 rounded-full transition-colors flex items-center px-1 ${f.creditSale?'bg-green-500':'bg-gray-200'}`}>
                    <div className={`w-4 h-4 bg-white rounded-full shadow transition-transform ${f.creditSale?'translate-x-6':'translate-x-0'}`} />
                  </div>
                  <span className="text-sm font-medium text-gray-700">{t.creditSale} (उधारो)</span>
                </label>
                {f.creditSale && (
                  <select value={f.custId} onChange={e=>setF({...f,custId:e.target.value})} className="inp pr-8">
                    <option value="">{t.selectCust}</option>
                    {custs.map(c=><option key={c.id} value={c.id}>{c.name}{c.balance>0?` (Udhaaro: ${fmt(c.balance)})`:''}</option>)}
                  </select>
                )}
              </>
            )}
          </div>
          <div className="grid grid-cols-2 gap-3 mt-5">
            <button onClick={()=>setModal(false)} className="btn-outline">{t.cancel}</button>
            <button onClick={save} disabled={busy} className="btn-primary">{busy?'...':t.save}</button>
          </div>
        </Modal>
      )}
    </div>
  );
};

// ─── CUSTOMERS ────────────────────────────────────────────────────────────────
const Customers = ({ shopId, t }) => {
  const [custs, setCusts]     = useState([]);
  const [ledger, setLedger]   = useState([]);
  const [q, setQ]             = useState('');
  const [sel, setSel]         = useState(null);
  const [addModal, setAddModal]= useState(false);
  const [txModal, setTxModal] = useState(null); // 'credit'|'payment'
  const [cf, setCf]           = useState({name:'',phone:'',address:''});
  const [tf, setTf]           = useState({amount:'',desc:''});
  const [busy, setBusy]       = useState(false);

  useEffect(() => {
    const u1 = db.collection(`shops/${shopId}/customers`).orderBy('name')
      .onSnapshot(s=>setCusts(s.docs.map(d=>({id:d.id,...d.data()}))));
    const u2 = db.collection(`shops/${shopId}/ledger`).orderBy('createdAt','desc').limit(200)
      .onSnapshot(s=>setLedger(s.docs.map(d=>({id:d.id,...d.data()}))));
    return ()=>{ u1(); u2(); };
  }, [shopId]);

  const filtered = custs.filter(c=>c.name?.toLowerCase().includes(q.toLowerCase())||c.phone?.includes(q));
  const selLedger = sel ? ledger.filter(l=>l.customerId===sel.id) : [];

  const addCust = async () => {
    if (!cf.name.trim()) return;
    setBusy(true);
    await db.collection(`shops/${shopId}/customers`).add({name:cf.name.trim(),phone:cf.phone,address:cf.address,balance:0,createdAt:TS()});
    setBusy(false); setAddModal(false); setCf({name:'',phone:'',address:''});
  };

  const doTx = async () => {
    if (!tf.amount||!sel) return;
    setBusy(true);
    const amt = parseFloat(tf.amount);
    const isCredit = txModal==='credit';
    const batch = db.batch();
    batch.update(db.collection(`shops/${shopId}/customers`).doc(sel.id), {balance:INC(isCredit?amt:-amt)});
    batch.set(db.collection(`shops/${shopId}/ledger`).doc(), {customerId:sel.id,type:txModal,amount:amt,description:tf.desc||(isCredit?'उधारो':'भुक्तानी'),createdAt:TS()});
    await batch.commit();

    // Refresh selected
    const snap = await db.collection(`shops/${shopId}/customers`).doc(sel.id).get();
    setSel({id:snap.id,...snap.data()});
    setBusy(false); setTxModal(null); setTf({amount:'',desc:''});
  };

  // Detail view
  if (sel) {
    const selCust = custs.find(c=>c.id===sel.id) || sel;
    return (
      <div className="p-4 fade-in">
        <div className="flex items-center gap-3 mb-4">
          <button onClick={()=>setSel(null)} className="w-9 h-9 bg-white rounded-xl flex items-center justify-center shadow-sm">
            <Ic n="back" s={18} />
          </button>
          <div>
            <h1 className="text-lg font-bold text-gray-800 leading-tight">{selCust.name}</h1>
            {selCust.phone && <p className="text-xs text-gray-400">{selCust.phone}</p>}
          </div>
        </div>

        {/* Balance */}
        <div className={`rounded-2xl p-5 mb-4 text-white ${selCust.balance>0?'bg-red-500':selCust.balance<0?'bg-green-600':'bg-gray-500'}`}>
          <p className="text-sm opacity-75 font-medium">{t.balance}</p>
          <p className="text-3xl font-bold">{fmt(Math.abs(selCust.balance||0))}</p>
          <p className="text-sm opacity-70 mt-1">
            {selCust.balance>0 ? `${selCust.name} ${t.oweYou}` : selCust.balance<0 ? t.youOwe : t.settled}
          </p>
        </div>

        <div className="grid grid-cols-2 gap-3 mb-5">
          <button onClick={()=>setTxModal('credit')}
            className="flex items-center justify-center gap-2 bg-red-50 border-2 border-red-200 text-red-700 py-3.5 rounded-2xl font-bold text-sm">
            <span>↑</span> {t.udhaaro}
          </button>
          <button onClick={()=>setTxModal('payment')}
            className="flex items-center justify-center gap-2 bg-green-50 border-2 border-green-200 text-green-700 py-3.5 rounded-2xl font-bold text-sm">
            <span>✓</span> {t.payment}
          </button>
        </div>

        <p className="font-bold text-gray-700 mb-2 text-sm">{t.ledger}</p>
        <div className="space-y-2">
          {selLedger.map(l=>(
            <div key={l.id} className="card flex items-center gap-3 py-3">
              <div className={`w-9 h-9 rounded-xl flex items-center justify-center font-bold text-base flex-shrink-0 ${l.type==='credit'?'bg-red-100 text-red-500':'bg-green-100 text-green-600'}`}>
                {l.type==='credit'?'↑':'↓'}
              </div>
              <div className="flex-1">
                <p className="font-semibold text-gray-800 text-sm">{l.description}</p>
                <p className="text-xs text-gray-400">{fmtDate(l.createdAt)}</p>
              </div>
              <p className={`font-bold text-sm flex-shrink-0 ${l.type==='credit'?'text-red-500':'text-green-600'}`}>
                {l.type==='credit'?'+':'-'}{fmt(l.amount)}
              </p>
            </div>
          ))}
          {selLedger.length===0 && <div className="text-center py-8 text-gray-400"><p>{t.noData}</p></div>}
        </div>

        {txModal && (
          <Modal onClose={()=>setTxModal(null)} title={txModal==='credit'?t.udhaaro:t.payment}>
            <div className="space-y-3">
              <input value={tf.amount} onChange={e=>setTf({...tf,amount:e.target.value})} type="number" placeholder={t.amount} className="inp" />
              <input value={tf.desc} onChange={e=>setTf({...tf,desc:e.target.value})} placeholder={t.desc} className="inp" />
            </div>
            <div className="grid grid-cols-2 gap-3 mt-5">
              <button onClick={()=>setTxModal(null)} className="btn-outline">{t.cancel}</button>
              <button onClick={doTx} disabled={busy} className="btn-primary">{busy?'...':t.save}</button>
            </div>
          </Modal>
        )}
      </div>
    );
  }

  return (
    <div className="p-4 fade-in">
      <div className="flex items-center justify-between mb-4">
        <h1 className="text-xl font-bold text-gray-800">{t.customers}</h1>
        <button onClick={()=>setAddModal(true)} className="flex items-center gap-1.5 bg-green-600 text-white text-sm font-bold px-4 py-2 rounded-xl">
          <Ic n="plus" s={15} c="#fff" /> {t.add}
        </button>
      </div>

      <input value={q} onChange={e=>setQ(e.target.value)} placeholder={t.search} className="inp mb-4" />

      <div className="space-y-2">
        {filtered.map(c=>(
          <div key={c.id} onClick={()=>setSel(c)}
            className="card flex items-center gap-3 cursor-pointer active:scale-99 transition-transform">
            <div className="w-11 h-11 rounded-2xl flex items-center justify-center font-bold text-lg flex-shrink-0"
              style={{background:'linear-gradient(135deg,#16a34a,#4ade80)',color:'white'}}>
              {c.name[0].toUpperCase()}
            </div>
            <div className="flex-1 min-w-0">
              <p className="font-bold text-gray-800">{c.name}</p>
              <p className="text-xs text-gray-400">{c.phone||c.address||'No contact'}</p>
            </div>
            <div className="text-right flex-shrink-0">
              <p className={`font-bold text-sm ${c.balance>0?'text-red-500':c.balance<0?'text-green-600':'text-gray-400'}`}>
                {c.balance!==0?fmt(Math.abs(c.balance||0)):t.settled}
              </p>
              {c.balance>0 && <p className="text-xs text-red-400">उधारो</p>}
              {c.balance<0 && <p className="text-xs text-green-500">Credit</p>}
            </div>
          </div>
        ))}
        {filtered.length===0 && <div className="text-center py-12 text-gray-400"><p className="text-4xl mb-2">👥</p><p>{t.noData}</p></div>}
      </div>

      {addModal && (
        <Modal onClose={()=>setAddModal(false)} title={t.addCust}>
          <div className="space-y-3">
            <input value={cf.name} onChange={e=>setCf({...cf,name:e.target.value})} placeholder={t.custName} className="inp" />
            <input value={cf.phone} onChange={e=>setCf({...cf,phone:e.target.value})} placeholder={t.phone} type="tel" className="inp" />
            <input value={cf.address} onChange={e=>setCf({...cf,address:e.target.value})} placeholder={t.address} className="inp" />
          </div>
          <div className="grid grid-cols-2 gap-3 mt-5">
            <button onClick={()=>setAddModal(false)} className="btn-outline">{t.cancel}</button>
            <button onClick={addCust} disabled={busy} className="btn-primary">{busy?'...':t.add}</button>
          </div>
        </Modal>
      )}
    </div>
  );
};

// ─── REPORTS ─────────────────────────────────────────────────────────────────
const Reports = ({ shopId, t }) => {
  const [txs, setTxs]     = useState([]);
  const [period, setPeriod] = useState('today');

  useEffect(() => {
    const unsub = db.collection(`shops/${shopId}/transactions`).orderBy('createdAt','desc')
      .onSnapshot(s=>setTxs(s.docs.map(d=>({id:d.id,...d.data()}))));
    return unsub;
  }, [shopId]);

  const filt = txs.filter(tx => {
    if (period==='all') return true;
    if (period==='today') return isToday(tx.createdAt);
    if (period==='week') return withinDays(tx.createdAt, 7);
    if (period==='month') return sameMonth(tx.createdAt);
    return true;
  });

  const sales    = filt.filter(x=>x.type==='sale').reduce((s,x)=>s+(x.amount||0),0);
  const purch    = filt.filter(x=>x.type==='purchase').reduce((s,x)=>s+(x.amount||0),0);
  const exp      = filt.filter(x=>x.type==='expense').reduce((s,x)=>s+(x.amount||0),0);
  const profit   = sales - purch - exp;

  const cards = [
    {label:t.totalSales, val:fmt(sales),  bg:'#16a34a', icon:'📈'},
    {label:t.totalPurch, val:fmt(purch),  bg:'#2563eb', icon:'📦'},
    {label:t.totalExp,   val:fmt(exp),    bg:'#d97706', icon:'💸'},
    {label:t.netProfit,  val:fmt(profit), bg:profit>=0?'#059669':'#dc2626', icon:profit>=0?'✅':'❌'},
  ];

  const typeRows = ['sale','purchase','expense'].map(tp=>({
    type:tp, count:filt.filter(x=>x.type===tp).length,
    total:filt.filter(x=>x.type===tp).reduce((s,x)=>s+(x.amount||0),0)
  }));

  return (
    <div className="p-4 fade-in">
      <h1 className="text-xl font-bold text-gray-800 mb-4">{t.reports}</h1>

      <div className="flex gap-2 mb-5 overflow-x-auto pb-1">
        {[['today',t.today],['week',t.week],['month',t.month],['all',t.all]].map(([v,l])=>(
          <button key={v} onClick={()=>setPeriod(v)}
            className={`px-4 py-2 rounded-xl text-sm font-bold whitespace-nowrap flex-shrink-0 ${period===v?'bg-green-600 text-white':'bg-white text-gray-600'}`}>
            {l}
          </button>
        ))}
      </div>

      <div className="grid grid-cols-2 gap-3 mb-5">
        {cards.map((c,i)=>(
          <div key={i} className="rounded-2xl p-4 text-white" style={{background:c.bg}}>
            <div className="text-xl mb-0.5">{c.icon}</div>
            <p className="text-xs opacity-75 font-medium">{c.label}</p>
            <p className="font-bold text-sm mt-0.5">{c.val}</p>
          </div>
        ))}
      </div>

      <div className="card">
        <p className="font-bold text-gray-700 mb-3">{t.txSummary}</p>
        <div className="space-y-3">
          {typeRows.map(row=>(
            <div key={row.type} className="flex items-center justify-between">
              <div className="flex items-center gap-2">
                <span>{row.type==='sale'?'💰':row.type==='purchase'?'📦':'💸'}</span>
                <span className="text-sm text-gray-700 font-medium">{t[row.type]}</span>
              </div>
              <div className="flex items-center gap-3">
                <span className="text-xs text-gray-400">{row.count} {t.entries}</span>
                <span className={`font-bold text-sm ${row.type==='sale'?'text-green-600':'text-red-500'}`}>
                  {fmt(row.total)}
                </span>
              </div>
            </div>
          ))}
          <div className="border-t pt-3 flex items-center justify-between">
            <span className="font-bold text-gray-700">{t.netProfit}</span>
            <span className={`font-bold text-base ${profit>=0?'text-green-600':'text-red-500'}`}>{fmt(profit)}</span>
          </div>
        </div>
      </div>
    </div>
  );
};

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
const MainApp = ({ user, shopId, shopData, onLogout }) => {
  const [page, setPage] = useState('dashboard');
  const [lang, setLang] = useState('ne');
  const t = L[lang];

  const nav = [
    {id:'dashboard', icon:'home',  label:t.dashboard},
    {id:'inventory', icon:'box',   label:t.inventory},
    {id:'transactions', icon:'money', label:t.transactions},
    {id:'customers', icon:'users', label:t.customers},
    {id:'reports',   icon:'chart', label:t.reports},
  ];

  const pages = {
    dashboard:   <Dashboard shopId={shopId} shopData={shopData} t={t} setPage={setPage} lang={lang} setLang={setLang} onLogout={onLogout} />,
    inventory:   <Inventory shopId={shopId} t={t} />,
    transactions:<Transactions shopId={shopId} t={t} />,
    customers:   <Customers shopId={shopId} t={t} />,
    reports:     <Reports shopId={shopId} t={t} />,
  };

  return (
    <div style={{height:'100vh',display:'flex',flexDirection:'column',background:'#f0fdf4'}}>
      {/* Page area */}
      <div className="app-scroll flex-1" style={{paddingBottom:68}}>
        {pages[page]}
      </div>

      {/* Bottom Nav */}
      <div className="bottom-nav" style={{background:'#fff',borderTop:'1px solid #f0fdf4',boxShadow:'0 -4px 20px rgba(0,0,0,0.08)'}}>
        <div className="flex">
          {nav.map(item=>{
            const active = page===item.id;
            return (
              <button key={item.id} onClick={()=>setPage(item.id)}
                className="flex-1 flex flex-col items-center py-2.5 gap-0.5 transition-all"
                style={{color:active?'#16a34a':'#9ca3af'}}>
                {item.id==='transactions'
                  ? <Ic n="money" s={20} c={active?'#16a34a':'#9ca3af'} />
                  : item.id==='inventory'
                    ? <Ic n="box" s={20} c={active?'#16a34a':'#9ca3af'} />
                    : <Ic n={item.icon} s={20} c={active?'#16a34a':'#9ca3af'} />
                }
                <span style={{fontSize:9.5,fontWeight:active?700:500}}>{item.label}</span>
                {active && <div style={{width:4,height:4,background:'#16a34a',borderRadius:'50%',marginTop:-2}} />}
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
};

// ─── ROOT ─────────────────────────────────────────────────────────────────────
const App = () => {
  const [user, setUser]       = useState(undefined); // undefined = loading
  const [shopId, setShopId]   = useState(null);
  const [shopData, setShopData] = useState(null);
  const [lang] = useState('ne');
  const shopUnsub = useRef(null);

  useEffect(() => {
    const unsub = auth.onAuthStateChanged(async u => {
      if (u) {
        setUser(u);
        const doc = await db.collection('users').doc(u.uid).get();
        const sid = doc.data()?.shopId;
        if (sid) attachShop(sid);
        else setUser(u); // triggers shop setup
      } else {
        setUser(null);
        setShopId(null);
        setShopData(null);
      }
    });
    return unsub;
  }, []);

  const attachShop = (sid) => {
    if (shopUnsub.current) shopUnsub.current();
    setShopId(sid);
    shopUnsub.current = db.collection('shops').doc(sid).onSnapshot(snap => {
      if (snap.exists) setShopData({id:snap.id,...snap.data()});
    });
  };

  const logout = async () => {
    if (shopUnsub.current) shopUnsub.current();
    await auth.signOut();
    setShopId(null); setShopData(null);
  };

  // Loading
  if (user === undefined) return (
    <div style={{minHeight:'100vh',background:'linear-gradient(160deg,#14532d,#16a34a)'}}
      className="flex items-center justify-center">
      <div className="text-center text-white">
        <div className="text-6xl mb-4 animate-bounce">🛒</div>
        <p className="text-xl font-bold">मेरो पसल</p>
        <p className="text-sm opacity-60 mt-1">Loading...</p>
      </div>
    </div>
  );

  if (!user) return <AuthScreen />;
  if (!shopId) return <ShopSetup user={user} onDone={attachShop} lang={lang} />;
  return <MainApp user={user} shopId={shopId} shopData={shopData} onLogout={logout} />;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

// Register service worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
