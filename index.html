function adToBs(adDate){
  const d=new Date(adDate);
  let rem=Math.floor((d-AD_EPOCH)/864e5);
  let y=2070,m=0;
  while(rem>=0){
    const yDays=(BS_DATA[y]||[31,31,32,31,31,31,30,29,30,29,30,30]).reduce((a,b)=>a+b,0);
    if(rem>=yDays){rem-=yDays;y++;}else break;
  }
  const mo=BS_DATA[y]||[31,31,32,31,31,31,30,29,30,29,30,30];
  while(rem>=mo[m]&&m<11){rem-=mo[m];m++;}
  return{y,m:m+1,d:rem+1};
}

function fmtBS(ts,lang='ne'){
  if(!ts)return'';
  try{
    const bs=adToBs(new Date(ts));
    const mo=lang==='ne'?BS_MO_NE:BS_MO_EN;
    return lang==='ne'?`${bs.d} ${mo[bs.m-1]} ${bs.y}`:`${bs.d} ${mo[bs.m-1]} ${bs.y} BS`;
  }catch{return'';}
}

function todayBS(lang='ne'){return fmtBS(Date.now(),lang);}

/* ══ LINE CHART ═════════════════════════════════════════════════════════════ */
const LineChart=({data,color='#5eead4',h=90})=>{
  if(!data||data.length<2)return<div style={{height:h,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--sub)',fontSize:13}}>डेटा छैन</div>;
  const max=Math.max(...data.map(d=>d.v),1);
  const W=300,H=h-20;
  const pts=data.map((d,i)=>({x:(i/(data.length-1))*W,y:H-(d.v/max)*(H-6)+3}));
  const line=pts.map((p,i)=>`${i?'L':'M'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  return(
    <svg viewBox={`0 0 ${W} ${H+20}`} style={{width:'100%',height:h}}>
      <defs><linearGradient id="lcg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity=".35"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
      <path d={`${line} L${W},${H} L0,${H} Z`} fill="url(#lcg)"/>
      <path d={line} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      {pts.map((p,i)=>(
        <g key={i}>
          <circle cx={p.x} cy={p.y} r="3.5" fill={color} stroke="var(--card)" strokeWidth="2"/>
          <text x={p.x} y={H+17} textAnchor="middle" fontSize="9.5" fill="var(--sub)" fontWeight="600">{data[i].label}</text>
        </g>
      ))}
    </svg>
  );
};

/* ══ PIN LOCK ════════════════════════════════════════════════════════════════ */
const PinLock=({shopId,onUnlock,t})=>{
  const[digits,sDigits]=useState('');const[err,sErr]=useState(false);
  const stored=localStorage.getItem(`yoga_pin_${shopId}`)||'';
  const press=d=>{
    if(digits.length>=4)return;
    const nd=digits+d;
    sDigits(nd);
    if(nd.length===4){
      if(nd===stored){onUnlock();}
      else{sErr(true);setTimeout(()=>{sDigits('');sErr(false);},700);}
    }
  };
  const del=()=>sDigits(d=>d.slice(0,-1));
  return(
    <div style={{minHeight:'100vh',background:'linear-gradient(160deg,#042f2e,#0f766e)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24}}>
      <div style={{fontSize:52,marginBottom:16}}>🔒</div>
      <h2 style={{fontSize:22,fontWeight:800,color:'#fff',margin:'0 0 8px'}}>{t.pinEnter}</h2>
      <p style={{fontSize:13,color:'rgba(255,255,255,.5)',margin:'0 0 36px'}}>Yoga</p>
      {/* Dots */}
      <div style={{display:'flex',gap:14,marginBottom:40}}>
        {[0,1,2,3].map(i=><div key={i} className="pin-dot" style={{background:err?'#f87171':i<digits.length?'#fff':'transparent',borderColor:err?'#f87171':'rgba(255,255,255,.4)'}}/>)}
      </div>
      {err&&<p style={{color:'#f87171',fontSize:14,fontWeight:600,marginBottom:16}}>{t.pinWrong}</p>}
      {/* Keypad */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14}}>
        {['1','2','3','4','5','6','7','8','9','','0','⌫'].map((k,i)=>(
          k===''?<div key={i}/>:
          <button key={i} className="pin-key" onClick={()=>k==='⌫'?del():press(k)}
            style={{color:k==='⌫'?'rgba(255,255,255,.7)':'#fff',background:'rgba(255,255,255,.1)',border:'1px solid rgba(255,255,255,.15)'}}>
            {k}
          </button>
        ))}
      </div>
    </div>
  );
};

/* ══ PIN SETUP ═══════════════════════════════════════════════════════════════ */
const PinSetup=({shopId,onDone,t,existing})=>{
  const[step,sStep]=useState(1);const[pin1,sPin1]=useState('');const[pin2,sPin2]=useState('');
  const[digits,sDigits]=useState('');const[err,sErr]=useState('');
  const press=d=>{
    if(digits.length>=4)return;
    const nd=digits+d;
    sDigits(nd);
    if(nd.length===4){
      if(step===1){sPin1(nd);sDigits('');sStep(2);}
      else{
        if(nd===pin1){localStorage.setItem(`yoga_pin_${shopId}`,nd);toast(t.pinSet);onDone();}
        else{sErr('PIN मेल खाएन');sDigits('');sStep(1);sPin1('');setTimeout(()=>sErr(''),2000);}
      }
    }
  };
  const del=()=>sDigits(d=>d.slice(0,-1));
  return(
    <div style={{minHeight:'100vh',background:'linear-gradient(160deg,#042f2e,#0f766e)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24}}>
      <div style={{fontSize:48,marginBottom:14}}>🔐</div>
      <h2 style={{fontSize:20,fontWeight:800,color:'#fff',margin:'0 0 6px'}}>{step===1?t.pinNew:t.pinConfirm}</h2>
      <p style={{fontSize:12,color:'rgba(255,255,255,.5)',margin:'0 0 32px'}}>चरण {step}/२</p>
      <div style={{display:'flex',gap:14,marginBottom:36}}>
        {[0,1,2,3].map(i=><div key={i} className="pin-dot" style={{background:i<digits.length?'#fff':'transparent',borderColor:'rgba(255,255,255,.4)'}}/>)}
      </div>
      {err&&<p style={{color:'#f87171',fontSize:14,marginBottom:14}}>{err}</p>}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14}}>
        {['1','2','3','4','5','6','7','8','9','','0','⌫'].map((k,i)=>(

          <button key={i} className="pin-key" onClick={()=>k==='⌫'?del():press(k)}
            style={{color:'#fff',background:'rgba(255,255,255,.1)',border:'1px solid rgba(255,255,255,.15)'}}>
            {k}
          </button>

      </div>
      <button onClick={onDone} style={{marginTop:28,background:'none',border:'none',color:'rgba(255,255,255,.5)',fontSize:13,cursor:'pointer'}}>{t.cancel}</button>
    </div>
  );
};

/* ══ SHOP SETUP ═════════════════════════════════════════════════════════════ */
const ShopSetup=({user,onDone,lang})=>{
  const[mode,sMode]=useState(null);const[sName,sSName]=useState('');const[code,sCode]=useState('');const[err,sErr]=useState('');const[busy,sBusy]=useState(false);
  const t=T[lang];
  const create=async()=>{
    if(!sName.trim())return sErr('नाम आवश्यक');sBusy(true);sErr('');
    try{
      const c=genCode();const r=db.ref('shops').push();
      await r.set({name:sName.trim(),code:c,ownerId:user.uid,members:{[user.uid]:{role:'owner'}},status:'active',plan:'free',trialStart:now(),createdAt:now()});
      await db.ref(`users/${user.uid}/shopId`).set(r.key);onDone(r.key);
    }catch(e){sErr(e.message);}sBusy(false);
  };
  const join=async()=>{
    if(!code.trim())return sErr('कोड आवश्यक');sBusy(true);sErr('');
    try{
      const snap=await db.ref('shops').orderByChild('code').equalTo(code.trim().toUpperCase()).once('value');
      if(!snap.exists()){sErr('पसल फेला परेन');sBusy(false);return;}

        <div style={{background:'var(--card)',borderRadius:24,padding:22,boxShadow:'0 28px 80px rgba(0,0,0,.3)'}}>
          {!mode?(<div style={{display:'flex',flexDirection:'column',gap:11}}>
            <button onClick={()=>sMode('create')} className="btn Bp" style={{fontSize:16,padding:'16px'}}><span style={{fontSize:22}}>✨</span>{t.createShop}</button>
            <button onClick={()=>sMode('join')} className="btn Bo" style={{fontSize:16,padding:'16px'}}><span style={{fontSize:22}}>🔗</span>{t.joinShop}</button>
          </div>):mode==='create'?(<div style={{display:'flex',flexDirection:'column',gap:11}}>
            <input value={sName} onChange={e=>sSName(e.target.value)} placeholder={t.shopName} className="inp" onKeyDown={e=>e.key==='Enter'&&create()}/>
            {err&&<p style={{color:'var(--red)',fontSize:13,margin:0}}>{err}</p>}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              <button onClick={()=>sMode(null)} className="btn Bo">{t.cancel}</button>
              <button onClick={create} disabled={busy} className="btn Bp">{busy?'...':t.create}</button>
            </div>
          </div>):(<div style={{display:'flex',flexDirection:'column',gap:11}}>
            <p style={{fontSize:14,color:'var(--sub)',textAlign:'center',margin:0}}>६ अक्षरको पसल कोड लेख्नुहोस्</p>
            <input value={code} onChange={e=>sCode(e.target.value.toUpperCase())} placeholder="XXXXXX" className="inp" style={{textAlign:'center',fontSize:26,fontWeight:900,letterSpacing:8}} maxLength={6}/>
            {err&&<p style={{color:'var(--red)',fontSize:13,margin:0,textAlign:'center'}}>{err}</p>}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              <button onClick={()=>sMode(null)} className="btn Bo">{t.cancel}</button>
              <button onClick={join} disabled={busy} className="btn Bp">{busy?'...':t.join}</button>
            </div>

  );
};

/* ══ TX MODAL ════════════════════════════════════════════════════════════════ */
const TxModal=({shopId,shopData,t,onClose,defaultType='sale',role,lang})=>{
  const[prods,sProds]=useState([]);const[parties,sParties]=useState([]);
  const[f,sF]=useState({type:defaultType,amount:'',desc:'',prodId:'',qty:'1',partyId:'',isCredit:false,payMethod:'cash',useVat:false});
  const[busy,sBusy]=useState(false);const[invoice,sInvoice]=useState(null);
  useEffect(()=>{
    db.ref(`shops/${shopId}/inventory`).once('value',s=>sProds(oa(s.val()).sort((a,b)=>(a.name||'').localeCompare(b.name||''))));
    db.ref(`shops/${shopId}/parties`).once('value',s=>sParties(oa(s.val()).sort((a,b)=>(a.name||'').localeCompare(b.name||''))));
  },[shopId]);

  const save=async()=>{
    const amt=parseFloat(f.amount);if(!amt||amt<=0)return;
    sBusy(true);const qty=parseFloat(f.qty)||1;
    // Get invoice number
    const invSnap=await db.ref(`shops/${shopId}/meta/lastInvNo`).once('value');
    const nextInv=(invSnap.val()||0)+1;
    await db.ref(`shops/${shopId}/meta/lastInvNo`).set(nextInv);
    const vatAmt=f.useVat?Math.round(amt*0.13):0;
    const txData={type:f.type,amount:amt,vatAmount:vatAmt,totalAmount:amt+vatAmt,description:f.desc||t[f.type],productId:f.prodId||null,quantity:qty,partyId:(f.isCredit&&f.partyId)?f.partyId:null,paymentMethod:f.payMethod,useVat:f.useVat,invNo:nextInv,createdAt:now()};
    await db.ref(`shops/${shopId}/transactions`).push(txData);
    if(f.prodId){const delta=f.type==='sale'?-qty:f.type==='purch'?qty:0;if(delta!==0){const sn=await db.ref(`shops/${shopId}/inventory/${f.prodId}/stock`).once('value');await db.ref(`shops/${shopId}/inventory/${f.prodId}/stock`).set((sn.val()||0)+delta);}}
    if(f.isCredit&&f.partyId){
      const sn=await db.ref(`shops/${shopId}/parties/${f.partyId}/balance`).once('value');
      const delta2=f.type==='sale'?amt:-amt;
      await db.ref(`shops/${shopId}/parties/${f.partyId}/balance`).set((sn.val()||0)+delta2);
      await db.ref(`shops/${shopId}/ledger`).push({partyId:f.partyId,type:f.type==='sale'?'receivable':'payable',amount:amt,description:f.desc||t[f.type],createdAt:now()});
    }
    const party=parties.find(p=>p.id===f.partyId);
    if(f.type==='sale'){
      sInvoice({...txData,invNo:nextInv,partyName:party?.name||''});
    } else {
      toast(f.type==='purch'?'खरिद थपियो ✓':'खर्च थपियो ✓');sBusy(false);onClose();
    }
    sBusy(false);
  };

  if(invoice)return<InvoiceModal onClose={onClose} txData={invoice} shopData={shopData} lang={lang}/>;

  const TC={sale:{b:'#f0fdfa',c:'var(--p3)'},purch:{b:'#dbeafe',c:'var(--blue)'},exp:{b:'#fee2e2',c:'var(--red)'}};
  const payMethods=['cash','esewa','khalti','qr','fonepay'];
  return(
    <Modal onClose={onClose} title={t.addTx}>
      {role!=='cashier'&&<div style={{display:'flex',gap:8,marginBottom:16}}>
        {[['sale',t.sale],['purch',t.purch],['exp',t.exp]].map(([tp,lb])=>{
          const a=f.type===tp,tc=TC[tp];
          return<button key={tp} onClick={()=>sF({...f,type:tp})} style={{flex:1,padding:'11px 4px',borderRadius:12,border:`2px solid ${a?tc.c:'var(--bdr)'}`,fontWeight:700,fontSize:13,cursor:'pointer',background:a?tc.b:'transparent',color:a?tc.c:'var(--sub)'}}>
            {lb}
          </button>;
        })}
      </div>}
      <div style={{display:'flex',flexDirection:'column',gap:11}}>
        <input value={f.amount} onChange={e=>sF({...f,amount:e.target.value})} type="number" placeholder={t.amount} className="inp"/>
        <input value={f.desc} onChange={e=>sF({...f,desc:e.target.value})} placeholder={t.desc} className="inp"/>
        {role!=='cashier'&&<select value={f.prodId} onChange={e=>{const p=prods.find(x=>x.id===e.target.value);sF({...f,prodId:e.target.value,amount:p&&!f.amount?String(p.sellP||0):f.amount,desc:p&&!f.desc?p.name:f.desc});}} className="inp">
          <option value="">{t.selProd}</option>
          {prods.map(p=><option key={p.id} value={p.id}>{p.name} ({p.stock||0})</option>)}
        </select>}
        {f.prodId&&<input value={f.qty} onChange={e=>{const q=parseFloat(e.target.value)||1;const p=prods.find(x=>x.id===f.prodId);sF({...f,qty:e.target.value,amount:p?String((p.sellP||0)*q):f.amount});}} type="number" placeholder={t.qty} min="1" className="inp"/>}
        {/* Payment method */}
        {f.type==='sale'&&<>
          <p style={{fontSize:13,fontWeight:600,color:'var(--sub)',margin:0}}>{t.payMethod}</p>
          <div style={{display:'flex',gap:7,flexWrap:'wrap'}}>
            {payMethods.map(pm=>(
              <button key={pm} onClick={()=>sF({...f,payMethod:pm})} className="pil" style={{borderColor:f.payMethod===pm?'var(--p3)':'var(--bdr)',background:f.payMethod===pm?'var(--p3)':'transparent',color:f.payMethod===pm?'#fff':'var(--sub)'}}>
                {pm==='cash'?'💵':pm==='esewa'?'🟢':pm==='khalti'?'🟣':pm==='qr'?'📱':'📲'} {t[pm]}
              </button>
            ))}
          </div>
          {/* VAT */}
          <label style={{display:'flex',alignItems:'center',gap:12,cursor:'pointer'}}>
            <Switch on={f.useVat} onChange={v=>sF({...f,useVat:v})}/>
            <span style={{fontSize:14,fontWeight:600,color:'var(--txt)'}}>{t.addVat} (+13%)</span>
          </label>
          {f.useVat&&f.amount&&<p style={{fontSize:13,color:'var(--amber)',margin:0,fontWeight:600}}>जम्मा: {fmt(parseFloat(f.amount||0)+Math.round(parseFloat(f.amount||0)*0.13))}</p>}
          {/* Credit */}
          <label style={{display:'flex',alignItems:'center',gap:12,cursor:'pointer'}}>
            <Switch on={f.isCredit} onChange={v=>sF({...f,isCredit:v})}/>
            <span style={{fontSize:14,fontWeight:600,color:'var(--txt)'}}>{t.credit}</span>
          </label>
          {f.isCredit&&<select value={f.partyId} onChange={e=>sF({...f,partyId:e.target.value})} className="inp">
            <option value="">{t.selParty}</option>
            {parties.map(p=><option key={p.id} value={p.id}>{p.name}{p.balance?` — ${fmt(Math.abs(p.balance))}`:''}</option>)}
          </select>}
        </>}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginTop:18}}>
        <button onClick={onClose} className="btn Bo">{t.cancel}</button>
        <button onClick={save} disabled={busy} className="btn Bp">{busy?'...':t.save}</button>
      </div>
    </Modal>
  );
};

        <div style={{display:'flex',flexDirection:'column',gap:9}}>

                    <button onClick={()=>del(p.id)} style={{width:30,height:30,background:'#fef2f2',border:'none',borderRadius:10,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><Ic n="trash" s={13} c="#dc2626"/></button>
                  </div>
                </div>

          {filtered.length===0&&<div style={{textAlign:'center',padding:'52px 0',color:'var(--sub)'}}><div style={{fontSize:52,marginBottom:12}}>📦</div><p style={{fontSize:15,margin:0}}>{t.noData}</p></div>}

      </div>
      {modal&&<Modal onClose={()=>sModal(false)} title={editing?t.edit:t.addProd}>
        <div style={{display:'flex',flexDirection:'column',gap:11}}>
          <input value={f.name} onChange={e=>sF({...f,name:e.target.value})} placeholder={t.prodName} className="inp"/>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <select value={f.cat} onChange={e=>sF({...f,cat:e.target.value})} className="inp">{['veg','fruit','grain','dairy','snack','bev','other'].map(c=><option key={c} value={c}>{CE[c]} {t[c]||c}</option>)}</select>
            <select value={f.unit} onChange={e=>sF({...f,unit:e.target.value})} className="inp">{['pcs','kg','gm','ltr'].map(u=><option key={u} value={u}>{t[u]}</option>)}</select>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <div><label style={{fontSize:12,color:'var(--sub)',fontWeight:600,display:'block',marginBottom:4}}>{t.buyP}</label><input value={f.buyP} onChange={e=>sF({...f,buyP:e.target.value})} type="number" placeholder="0" className="inp"/></div>
            <div><label style={{fontSize:12,color:'var(--sub)',fontWeight:600,display:'block',marginBottom:4}}>{t.sellP}</label><input value={f.sellP} onChange={e=>sF({...f,sellP:e.target.value})} type="number" placeholder="0" className="inp"/></div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <div><label style={{fontSize:12,color:'var(--sub)',fontWeight:600,display:'block',marginBottom:4}}>{t.stock}</label><input value={f.stock} onChange={e=>sF({...f,stock:e.target.value})} type="number" placeholder="0" className="inp"/></div>
            <div><label style={{fontSize:12,color:'var(--sub)',fontWeight:600,display:'block',marginBottom:4}}>{t.minStk}</label><input value={f.minStk} onChange={e=>sF({...f,minStk:e.target.value})} type="number" placeholder="5" className="inp"/></div>
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginTop:20}}>
          <button onClick={()=>sModal(false)} className="btn Bo">{t.cancel}</button>
          <button onClick={save} disabled={busy} className="btn Bp">{busy?'...':t.save}</button>
        </div>
      </Modal>}
    </div>
  );
};

/* ══ TRANSACTIONS ════════════════════════════════════════════════════════════ */
const Transactions=({shopId,shopData,t,qType,clearQ,role,lang})=>{
  const[txs,sTxs]=useState([]);const[prods,sProds]=useState([]);const[parties,sParties]=useState([]);
  const[typeF,sTypeF]=useState('all');const[period,sPeriod]=useState('all');const[modal,sModal]=useState(!!qType);const[selTx,sSelTx]=useState(null);
  useEffect(()=>{if(qType)sModal(true);},[qType]);
  useEffect(()=>{
    const r1=db.ref(`shops/${shopId}/transactions`);r1.on('value',s=>sTxs(oa(s.val()).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0))));
    db.ref(`shops/${shopId}/inventory`).once('value',s=>sProds(oa(s.val())));
    db.ref(`shops/${shopId}/parties`).once('value',s=>sParties(oa(s.val())));
    return()=>r1.off();
  },[shopId]);
  const filtered=txs.filter(x=>{
    const mT=typeF==='all'||x.type===typeF;
    const mP=period==='all'?true:period==='today'?isToday(x.createdAt):period==='week'?inDays(x.createdAt,7):inMonth(x.createdAt);
    return mT&&mP;
  });
  const tots={sale:filtered.filter(x=>x.type==='sale').reduce((s,x)=>s+(x.amount||0),0),purch:filtered.filter(x=>x.type==='purch').reduce((s,x)=>s+(x.amount||0),0),exp:filtered.filter(x=>x.type==='exp').reduce((s,x)=>s+(x.amount||0),0)};
  const profit=tots.sale-tots.purch-tots.exp;
  const TC={sale:{bg:'#f0fdfa',ic:'💰',c:'#0f766e'},purch:{bg:'#eff6ff',ic:'📦',c:'#2563eb'},exp:{bg:'#fef2f2',ic:'💸',c:'#b91c1c'}};
  const pmIcon={cash:'💵',esewa:'🟢',khalti:'🟣',qr:'📱',fonepay:'📲'};
  return(
    <div className="FI" style={{height:'100%',display:'flex',flexDirection:'column'}}>
      <div style={{padding:'48px 14px 12px',background:'var(--card)',borderBottom:'1px solid var(--bdr)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <h1 style={{fontSize:21,fontWeight:800,color:'var(--txt)',margin:0}}>💳 {t.tx}</h1>
          <button onClick={()=>{clearQ&&clearQ();sModal(true);}} style={{background:'var(--p2)',border:'none',borderRadius:13,padding:'9px 16px',color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',gap:5}}><Ic n="plus" s={14} c="#fff"/> {t.add}</button>
        </div>
        <div style={{display:'flex',gap:7,marginBottom:8,overflowX:'auto'}}>
          {[['all',t.all],['today',t.today],['week',t.week],['month',t.month]].map(([v,l])=><button key={v} onClick={()=>sPeriod(v)} className="pil" style={{borderColor:period===v?'#374151':'var(--bdr)',background:period===v?'#374151':'transparent',color:period===v?'#fff':'var(--sub)'}}>{l}</button>)}
        </div>
        {role!=='cashier'&&<div style={{display:'flex',gap:7,overflowX:'auto'}}>
          {[['all','सबै'],['sale',t.sale],['purch',t.purch],['exp',t.exp]].map(([v,l])=><button key={v} onClick={()=>sTypeF(v)} className="pil" style={{borderColor:typeF===v?'var(--p3)':'var(--bdr)',background:typeF===v?'var(--p3)':'transparent',color:typeF===v?'#fff':'var(--sub)'}}>{l}</button>)}
        </div>}
      </div>
      <div className="S" style={{flex:1,padding:'12px 14px',paddingBottom:80}}>
        {role!=='cashier'&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:14}}>
          {[{l:t.totalSales,v:fmt(tots.sale),c:'#0f766e',bg:'#f0fdfa'},{l:t.netProfit,v:fmt(profit),c:profit>=0?'#0f766e':'#dc2626',bg:profit>=0?'#f0fdfa':'#fef2f2'},{l:t.totalPurch,v:fmt(tots.purch),c:'#2563eb',bg:'#eff6ff'},{l:t.totalExp,v:fmt(tots.exp),c:'#b45309',bg:'#fffbeb'}].map((s,i)=>(
            <div key={i} style={{background:s.bg,borderRadius:14,padding:'12px 14px'}}>
              <p style={{fontSize:11,fontWeight:600,color:s.c,margin:'0 0 2px',opacity:.8}}>{s.l}</p>
              <p style={{fontSize:14,fontWeight:800,color:s.c,margin:0}}>{s.v}</p>
            </div>
          ))}
        </div>}
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {filtered.map(tx=>{
            const pr=prods.find(p=>p.id===tx.productId);const pa=parties.find(p=>p.id===tx.partyId);const s=TC[tx.type]||TC.exp;
            return(
              <div key={tx.id} className="cd" style={{padding:'12px 14px',display:'flex',gap:12,alignItems:'center',cursor:'pointer'}} onClick={()=>tx.type==='sale'&&sSelTx(tx)}>
                <div style={{width:40,height:40,borderRadius:14,background:s.bg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>{s.ic}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                    <p style={{fontSize:14,fontWeight:600,color:'var(--txt)',margin:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:130}}>{tx.description}</p>
                    {tx.paymentMethod&&tx.paymentMethod!=='cash'&&<span style={{fontSize:11}}>{pmIcon[tx.paymentMethod]||''}</span>}
                    {tx.useVat&&<span className="bdg" style={{background:'#fffbeb',color:'#b45309',fontSize:10}}>VAT</span>}
                    {tx.invNo&&<span className="bdg" style={{background:s.bg,color:s.c,fontSize:10}}>#{tx.invNo}</span>}
                  </div>
                  <p style={{fontSize:11,color:'var(--sub)',margin:'2px 0 0'}}>{pr?pr.name+' · ':''}{pa?pa.name+' · ':''}{fmtBS(tx.createdAt,lang)}</p>
                </div>
                <p style={{fontSize:14,fontWeight:800,color:tx.type==='sale'?'#0f766e':'#dc2626',margin:0,flexShrink:0}}>{tx.type==='sale'?'+':'-'}{fmts(tx.amount)}</p>
              </div>
            );
          })}
          {filtered.length===0&&<div style={{textAlign:'center',padding:'52px 0',color:'var(--sub)'}}><div style={{fontSize:52,marginBottom:12}}>💳</div><p style={{fontSize:15,margin:0}}>{t.noData}</p></div>}
        </div>
      </div>
      {modal&&<TxModal shopId={shopId} shopData={shopData} t={t} onClose={()=>{sModal(false);clearQ&&clearQ();}} defaultType={qType||'sale'} role={role} lang={lang}/>}
      {selTx&&<InvoiceModal onClose={()=>sSelTx(null)} txData={selTx} shopData={shopData} lang={lang}/>}
    </div>
  );
};

/* ══ PARTIES ══════════════════════════════════════════════════════════════════ */
const Parties=({shopId,t,lang})=>{
  const[parties,sParties]=useState([]);const[ledger,sLedger]=useState([]);const[txs,sTxs]=useState([]);const[q,sQ]=useState('');
  const[tab,sTab]=useState('customer');const[sel,sSel]=useState(null);const[addModal,sAddModal]=useState(false);
  const[txModal,sTxModal]=useState(null);const[cf,sCf]=useState({name:'',type:'customer',phone:'',addr:''});
  const[tf,sTf]=useState({amount:'',desc:''});const[busy,sBusy]=useState(false);
  useEffect(()=>{
    const r1=db.ref(`shops/${shopId}/parties`);r1.on('value',s=>sParties(oa(s.val()).sort((a,b)=>(a.name||'').localeCompare(b.name||''))));
    const r2=db.ref(`shops/${shopId}/ledger`);r2.on('value',s=>sLedger(oa(s.val()).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0))));
    const r3=db.ref(`shops/${shopId}/transactions`);r3.on('value',s=>sTxs(oa(s.val())));
    return()=>{r1.off();r2.off();r3.off();};
  },[shopId]);
  const filtered=parties.filter(p=>p.type===tab&&((p.name||'').toLowerCase().includes(q.toLowerCase())||(p.phone||'').includes(q)));
  const selP=sel?parties.find(p=>p.id===sel.id)||sel:null;
  const selL=sel?ledger.filter(l=>l.partyId===sel.id):[];
  const selTxs=sel?txs.filter(tx=>tx.partyId===sel.id).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0)).slice(0,10):[];
  const totalRec=parties.filter(p=>p.type==='customer'&&(p.balance||0)>0).reduce((s,p)=>s+(p.balance||0),0);
  const addParty=async()=>{if(!cf.name.trim())return;sBusy(true);await db.ref(`shops/${shopId}/parties`).push({name:cf.name.trim(),type:cf.type,phone:cf.phone,addr:cf.addr,balance:0,createdAt:now()});toast('थपियो ✓');sBusy(false);sAddModal(false);sCf({name:'',type:'customer',phone:'',addr:''});};
  const doTx=async()=>{
    if(!tf.amount||!sel)return;sBusy(true);
    const amt=parseFloat(tf.amount);const isCred=txModal==='cred';
    const sn=await db.ref(`shops/${shopId}/parties/${sel.id}/balance`).once('value');
    const delta=selP.type==='customer'?(isCred?amt:-amt):(isCred?-amt:amt);
    await db.ref(`shops/${shopId}/parties/${sel.id}/balance`).set((sn.val()||0)+delta);
    await db.ref(`shops/${shopId}/ledger`).push({partyId:sel.id,type:txModal,amount:amt,description:tf.desc||(isCred?'उधारो':'भुक्तानी'),createdAt:now()});
    toast(isCred?'उधारो थपियो ✓':'भुक्तानी थपियो ✓');sBusy(false);sTxModal(null);sTf({amount:'',desc:''});
  };
  const sendWA=p=>{
    const bal=Math.abs(p.balance||0);
    const msg=`नमस्ते ${p.name}! ${p.balance>0?`तपाईंले रु.${bal.toLocaleString('en-IN')} हाम्रो पसलमा दिनु छ।`:`हामीले तपाईंलाई रु.${bal.toLocaleString('en-IN')} दिनु छ।`}\n\n- ${t.app}`;
    window.open(`https://wa.me/${(p.phone||'').replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`,'_blank');
  };

  if(sel&&selP)return(
    <div className="FI" style={{height:'100%',display:'flex',flexDirection:'column'}}>
      <div style={{padding:'48px 14px 16px',background:'var(--card)',borderBottom:'1px solid var(--bdr)'}}>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <button onClick={()=>sSel(null)} style={{width:36,height:36,background:'var(--bg)',border:'1px solid var(--bdr)',borderRadius:12,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><Ic n="back" s={18} c="var(--txt)"/></button>
          <div style={{flex:1}}>
            <h1 style={{fontSize:19,fontWeight:800,color:'var(--txt)',margin:0}}>{selP.name}</h1>
            <p style={{fontSize:12,color:'var(--sub)',margin:'2px 0 0'}}>{selP.type==='customer'?t.customer:t.supplier}{selP.phone?` · ${selP.phone}`:''}</p>
          </div>
          {selP.phone&&<button onClick={()=>sendWA(selP)} style={{width:38,height:38,background:'#dcfce7',border:'none',borderRadius:12,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><Ic n="wa" s={20} c="#25d366"/></button>}
        </div>
      </div>
      <div className="S" style={{flex:1,padding:14,paddingBottom:80}}>
        <div style={{background:`linear-gradient(135deg,${selP.balance>0?'#7f1d1d,#dc2626':selP.balance<0?'#042f2e,#0f766e':'#1e293b,#334155'})`,borderRadius:22,padding:'22px',marginBottom:14,boxShadow:`0 8px 32px ${selP.balance>0?'rgba(220,38,38,.3)':selP.balance<0?'rgba(15,118,110,.3)':'rgba(0,0,0,.2)'}`}}>
          <p style={{fontSize:12,color:'rgba(255,255,255,.6)',margin:'0 0 4px',fontWeight:500}}>{t.bal}</p>
          <p style={{fontSize:38,fontWeight:900,color:'#fff',margin:'0 0 8px',lineHeight:1}}>{fmt(Math.abs(selP.balance||0))}</p>
          <p style={{fontSize:14,color:'rgba(255,255,255,.7)',margin:0}}>{selP.balance===0?t.settled:selP.type==='customer'?(selP.balance>0?`${selP.name} ${t.owesYou}`:t.youOwe):(selP.balance<0?`${selP.name} ${t.owesYou}`:t.youOwe)}</p>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}}>
          <button onClick={()=>sTxModal('cred')} style={{background:'#fef2f2',border:'2px solid #fca5a5',borderRadius:16,padding:'14px',cursor:'pointer',fontWeight:700,fontSize:14,color:'#b91c1c',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>↑ {t.addCred}</button>
          <button onClick={()=>sTxModal('pay')} style={{background:'#f0fdfa',border:'2px solid #5eead4',borderRadius:16,padding:'14px',cursor:'pointer',fontWeight:700,fontSize:14,color:'#0f766e',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>✓ {t.addPay}</button>
        </div>
        {/* Purchase history */}
        {selTxs.length>0&&<>
          <p style={{fontSize:14,fontWeight:700,color:'var(--txt)',margin:'0 0 10px'}}>🛒 खरिद इतिहास ({selTxs.length})</p>
          <div style={{display:'flex',flexDirection:'column',gap:7,marginBottom:14}}>
            {selTxs.map(tx=>(
              <div key={tx.id} className="cd" style={{padding:'11px 13px',display:'flex',gap:10,alignItems:'center'}}>
                <div style={{width:32,height:32,borderRadius:10,background:'#f0fdfa',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,flexShrink:0}}>🛒</div>
                <div style={{flex:1,minWidth:0}}>
                  <p style={{fontSize:13,fontWeight:600,color:'var(--txt)',margin:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{tx.description}</p>
                  <p style={{fontSize:11,color:'var(--sub)',margin:'1px 0 0'}}>{fmtBS(tx.createdAt,lang)}</p>
                </div>
                <p style={{fontSize:13,fontWeight:800,color:'#0f766e',margin:0}}>{fmt(tx.totalAmount||tx.amount)}</p>
              </div>
            ))}
          </div>
        </>}
        <p style={{fontSize:14,fontWeight:700,color:'var(--txt)',margin:'0 0 10px'}}>{t.ledger} ({selL.length})</p>
        <div style={{display:'flex',flexDirection:'column',gap:7}}>
          {selL.map(l=>(
            <div key={l.id} className="cd" style={{padding:'11px 13px',display:'flex',gap:11,alignItems:'center'}}>
              <div style={{width:34,height:34,borderRadius:11,background:l.type==='cred'?'#fef2f2':'#f0fdfa',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:15,color:l.type==='cred'?'#b91c1c':'#0f766e',flexShrink:0}}>{l.type==='cred'?'↑':'↓'}</div>
              <div style={{flex:1}}><p style={{fontSize:14,fontWeight:600,color:'var(--txt)',margin:0}}>{l.description}</p><p style={{fontSize:11,color:'var(--sub)',margin:'1px 0 0'}}>{fmtBS(l.createdAt,lang)} · {fmtT(l.createdAt)}</p></div>
              <p style={{fontSize:13,fontWeight:800,color:l.type==='cred'?'#dc2626':'#0f766e',margin:0}}>{l.type==='cred'?'+':'-'}{fmt(l.amount)}</p>
            </div>
          ))}
          {selL.length===0&&<div style={{textAlign:'center',padding:'28px 0',color:'var(--sub)'}}><p>{t.noData}</p></div>}
        </div>
      </div>
      {txModal&&<Modal onClose={()=>sTxModal(null)} title={txModal==='cred'?t.addCred:t.addPay}>
        <div style={{display:'flex',flexDirection:'column',gap:11}}>
          <input value={tf.amount} onChange={e=>sTf({...tf,amount:e.target.value})} type="number" placeholder={t.amount} className="inp"/>
          <input value={tf.desc} onChange={e=>sTf({...tf,desc:e.target.value})} placeholder={t.desc} className="inp"/>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginTop:18}}>
          <button onClick={()=>sTxModal(null)} className="btn Bo">{t.cancel}</button>
          <button onClick={doTx} disabled={busy} className="btn Bp">{busy?'...':t.save}</button>
        </div>
      </Modal>}
    </div>
  );

  return(
    <div className="FI" style={{height:'100%',display:'flex',flexDirection:'column'}}>
      <div style={{padding:'48px 14px 12px',background:'var(--card)',borderBottom:'1px solid var(--bdr)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <h1 style={{fontSize:21,fontWeight:800,color:'var(--txt)',margin:0}}>👥 {t.party}</h1>
          <button onClick={()=>sAddModal(true)} style={{background:'var(--p2)',border:'none',borderRadius:13,padding:'9px 16px',color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',gap:5}}><Ic n="plus" s={14} c="#fff"/> {t.add}</button>
        </div>
        <div style={{display:'flex',background:'var(--bg)',borderRadius:14,padding:3,marginBottom:10}}>

/* ══ REPORTS ══════════════════════════════════════════════════════════════════ */
const Reports=({shopId,t,lang})=>{
  const[txs,sTxs]=useState([]);const[inv,sInv]=useState([]);const[period,sPeriod]=useState('month');
  useEffect(()=>{
    const r=db.ref(`shops/${shopId}/transactions`);r.on('value',s=>sTxs(oa(s.val())));
    const r2=db.ref(`shops/${shopId}/inventory`);r2.on('value',s=>sInv(oa(s.val())));
    return()=>{r.off();r2.off();};
  },[shopId]);
  const filt=txs.filter(x=>period==='all'?true:period==='today'?isToday(x.createdAt):period==='week'?inDays(x.createdAt,7):inMonth(x.createdAt));
  const sales=filt.filter(x=>x.type==='sale').reduce((s,x)=>s+(x.amount||0),0);
  const purch=filt.filter(x=>x.type==='purch').reduce((s,x)=>s+(x.amount||0),0);
  const exp=filt.filter(x=>x.type==='exp').reduce((s,x)=>s+(x.amount||0),0);
  const profit=sales-purch-exp;
  const grossM=sales>0?Math.round(((sales-purch)/sales)*100):0;

  // Best sellers
  const prodSales={};filt.filter(x=>x.type==='sale'&&x.productId).forEach(x=>{if(!prodSales[x.productId])prodSales[x.productId]={qty:0,amt:0};prodSales[x.productId].qty+=(x.quantity||1);prodSales[x.productId].amt+=(x.amount||0);});
  const bestSellers=Object.entries(prodSales).map(([id,v])=>{const p=inv.find(i=>i.id===id);return{name:p?.name||id,...v};}).sort((a,b)=>b.amt-a.amt).slice(0,5);

  // Payment breakdown
  const payBreak={};filt.filter(x=>x.type==='sale').forEach(x=>{const m=x.paymentMethod||'cash';if(!payBreak[m])payBreak[m]=0;payBreak[m]+=(x.amount||0);});

  const chartData=useMemo(()=>{
    const days=[];
    for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const v=txs.filter(x=>x.type==='sale'&&x.createdAt&&new Date(x.createdAt).toDateString()===d.toDateString()).reduce((s,x)=>s+(x.amount||0),0);days.push({label:dayL(d.getDay()),v});}
    return days;
  },[txs]);

  const pmIcon={cash:'💵',esewa:'🟢',khalti:'🟣',qr:'📱',fonepay:'📲'};

  return(
    <div className="FI" style={{height:'100%',display:'flex',flexDirection:'column'}}>
      <div style={{padding:'48px 14px 12px',background:'var(--card)',borderBottom:'1px solid var(--bdr)'}}>
        <h1 style={{fontSize:21,fontWeight:800,color:'var(--txt)',margin:'0 0 12px'}}>📊 {t.rep}</h1>
        <div style={{display:'flex',gap:7,overflowX:'auto'}}>
          {[['today',t.today],['week',t.week],['month',t.month],['all',t.all]].map(([v,l])=><button key={v} onClick={()=>sPeriod(v)} className="pil" style={{borderColor:period===v?'var(--p3)':'var(--bdr)',background:period===v?'var(--p3)':'transparent',color:period===v?'#fff':'var(--sub)'}}>{l}</button>)}
        </div>
      </div>
      <div className="S" style={{flex:1,padding:'12px 14px',paddingBottom:80}}>
        {/* P&L */}
        <div style={{background:`linear-gradient(135deg,${profit>=0?'#042f2e,#0f766e':'#7f1d1d,#dc2626'})`,borderRadius:22,padding:'22px',marginBottom:12,boxShadow:`0 8px 28px ${profit>=0?'rgba(15,118,110,.3)':'rgba(220,38,38,.3)'}`}}>
          <p style={{fontSize:12,color:'rgba(255,255,255,.55)',margin:'0 0 4px',fontWeight:500}}>{t.netProfit}</p>
          <p style={{fontSize:38,fontWeight:900,color:'#fff',margin:'0 0 10px',lineHeight:1}}>{fmt(Math.abs(profit))}</p>
          <div style={{display:'flex',gap:18,flexWrap:'wrap'}}>
            {[{l:'📈 '+t.sale,v:fmts(sales),c:'#5eead4'},{l:'📦 '+t.purch,v:fmts(purch),c:'#f87171'},{l:'💸 '+t.exp,v:fmts(exp),c:'#fbbf24'}].map((s,i)=><div key={i}><p style={{fontSize:11,color:'rgba(255,255,255,.5)',margin:'0 0 1px'}}>{s.l}</p><p style={{fontSize:15,fontWeight:700,color:s.c,margin:0}}>{s.v}</p></div>)}
          </div>
        </div>
        {/* Summary grid */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:9,marginBottom:12}}>
          {[{l:t.totalSales,v:fmt(sales),c:'#0f766e',bg:'#f0fdfa',icon:'💰'},{l:t.totalPurch,v:fmt(purch),c:'#2563eb',bg:'#eff6ff',icon:'📦'},{l:t.totalExp,v:fmt(exp),c:'#b45309',bg:'#fffbeb',icon:'💸'},{l:'Gross Margin',v:`${grossM}%`,c:'#7c3aed',bg:'#faf5ff',icon:'📊'}].map((s,i)=>(
            <div key={i} style={{background:s.bg,borderRadius:16,padding:'14px'}}><span style={{fontSize:22}}>{s.icon}</span><p style={{fontSize:14,fontWeight:800,color:s.c,margin:'6px 0 2px'}}>{s.v}</p><p style={{fontSize:11,color:s.c,margin:0,opacity:.8,fontWeight:500}}>{s.l}</p></div>
          ))}
        </div>
        {/* Revenue chart */}
        <div className="cd" style={{marginBottom:12}}>
          <p style={{fontSize:14,fontWeight:700,color:'var(--txt)',margin:'0 0 12px'}}>📈 ७ दिनको बिक्री</p>
          <LineChart data={chartData} color="var(--p4)" h={95}/>
        </div>
        {/* Best sellers */}
        {bestSellers.length>0&&<div className="cd" style={{marginBottom:12}}>
          <p style={{fontSize:14,fontWeight:700,color:'var(--txt)',margin:'0 0 12px'}}>⭐ {t.bestSellers}</p>
          {bestSellers.map((p,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
              <span style={{fontSize:16,fontWeight:900,color:'var(--sub)',minWidth:20}}>{i+1}.</span>
              <div style={{flex:1}}>
                <p style={{fontSize:13,fontWeight:600,color:'var(--txt)',margin:0}}>{p.name}</p>
                <p style={{fontSize:11,color:'var(--sub)',margin:'1px 0 0'}}>{p.qty} {t.pcs} बिक्यो</p>
              </div>
              <p style={{fontSize:13,fontWeight:700,color:'var(--p2)',margin:0}}>{fmt(p.amt)}</p>
            </div>
          ))}
        </div>}
        {/* Payment breakdown */}
        {Object.keys(payBreak).length>0&&<div className="cd" style={{marginBottom:12}}>
          <p style={{fontSize:14,fontWeight:700,color:'var(--txt)',margin:'0 0 12px'}}>💳 {t.payBreakdown}</p>
          {Object.entries(payBreak).map(([pm,v])=>(
            <div key={pm} style={{display:'flex',alignItems:'center',gap:10,marginBottom:8,padding:'10px 12px',background:'var(--bg)',borderRadius:12}}>
              <span style={{fontSize:18}}>{pmIcon[pm]||'💵'}</span>
              <span style={{flex:1,fontSize:14,fontWeight:600,color:'var(--txt)'}}>{t[pm]||pm}</span>
              <span style={{fontSize:14,fontWeight:700,color:'var(--p2)'}}>{fmt(v)}</span>
              <span style={{fontSize:11,color:'var(--sub)'}}>{sales>0?Math.round(v/sales*100):0}%</span>
            </div>
          ))}
        </div>}
        {/* Breakdown */}
        <div className="cd">
          <p style={{fontSize:14,fontWeight:700,color:'var(--txt)',margin:'0 0 12px'}}>कारोबार विवरण</p>
          {[['sale','💰',sales,'#0f766e','#f0fdfa'],['purch','📦',purch,'#2563eb','#eff6ff'],['exp','💸',exp,'#b45309','#fffbeb']].map(([tp,ic,v,c,bg])=>(
            <div key={tp} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 12px',background:bg,borderRadius:12,marginBottom:8}}>
              <span style={{fontSize:20}}>{ic}</span>
              <div style={{flex:1}}><p style={{fontSize:14,fontWeight:600,color:c,margin:0}}>{t[tp]}</p><p style={{fontSize:11,color:c,opacity:.7,margin:'1px 0 0'}}>{filt.filter(x=>x.type===tp).length} कारोबार</p></div>
              <p style={{fontSize:14,fontWeight:800,color:c,margin:0}}>{fmt(v)}</p>
            </div>
          ))}
          <div style={{borderTop:'1px solid var(--bdr)',paddingTop:12,display:'flex',justifyContent:'space-between'}}>
            <span style={{fontSize:15,fontWeight:700,color:'var(--txt)'}}>{t.netProfit}</span>
            <span style={{fontSize:16,fontWeight:900,color:profit>=0?'#0f766e':'#dc2626'}}>{fmt(profit)}</span>
          </div>
        </div>
      </div>
    </div>
  );
};

/* ══ BILLS ════════════════════════════════════════════════════════════════════ */
const Bills=({shopId,t})=>{
  const[bills,sBills]=useState([]);const[modal,sModal]=useState(false);const[prev,sPrev]=useState(null);
  const[f,sF]=useState({desc:'',amount:'',img:null});const[busy,sBusy]=useState(false);const[uploading,sUploading]=useState(false);
  const fRef=useRef();const cRef=useRef();
  useEffect(()=>{const r=db.ref(`shops/${shopId}/bills`);r.on('value',s=>sBills(oa(s.val()).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0))));return()=>r.off();},[shopId]);
  const handleFile=async e=>{const file=e.target.files[0];if(!file)return;sUploading(true);try{const c=await compImg(file);sF(p=>({...p,img:c}));}catch{toast('छवि लोड हुन सकेन');}sUploading(false);e.target.value='';};
  const save=async()=>{if(!f.img)return;sBusy(true);await db.ref(`shops/${shopId}/bills`).push({description:f.desc||'बिल',amount:parseFloat(f.amount)||0,image:f.img,createdAt:now()});toast('बिल थपियो ✓');sBusy(false);sModal(false);sF({desc:'',amount:'',img:null});};
  const del=async id=>{if(window.confirm('हटाउने?')){await db.ref(`shops/${shopId}/bills/${id}`).remove();toast('हटाइयो');}};
  return(
    <div className="FI" style={{height:'100%',display:'flex',flexDirection:'column'}}>
      <div style={{padding:'48px 14px 16px',background:'var(--card)',borderBottom:'1px solid var(--bdr)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <h1 style={{fontSize:21,fontWeight:800,color:'var(--txt)',margin:0}}>🧾 {t.billsTitle}</h1>
          <button onClick={()=>sModal(true)} style={{background:'var(--p2)',border:'none',borderRadius:13,padding:'9px 16px',color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',gap:5}}><Ic n="plus" s={14} c="#fff"/> {t.add}</button>
        </div>
      </div>
      <div className="S" style={{flex:1,padding:'12px 14px',paddingBottom:80}}>
        {bills.length===0&&<div style={{textAlign:'center',padding:'64px 0',color:'var(--sub)'}}><div style={{fontSize:60,marginBottom:14}}>🧾</div><p style={{fontSize:17,fontWeight:600,margin:'0 0 6px'}}>{t.noBills}</p><p style={{fontSize:13,margin:0}}>बिल खिचेर यहाँ राख्नुहोस्</p></div>}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          {bills.map(b=>(
            <div key={b.id} style={{background:'var(--card)',borderRadius:18,overflow:'hidden',border:'1px solid var(--bdr)',cursor:'pointer',boxShadow:'var(--sh)'}} onClick={()=>sPrev(b)}>
              <div style={{height:130,background:'var(--bg)',overflow:'hidden'}}><img src={b.image} alt="bill" style={{width:'100%',height:'100%',objectFit:'cover'}}/></div>
              <div style={{padding:'10px 12px'}}>
                <p style={{fontSize:13,fontWeight:600,color:'var(--txt)',margin:'0 0 2px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{b.description}</p>
                {b.amount>0&&<p style={{fontSize:12,fontWeight:700,color:'var(--p2)',margin:'0 0 1px'}}>{fmt(b.amount)}</p>}
                <p style={{fontSize:11,color:'var(--sub)',margin:0}}>{fmtD(b.createdAt)}</p>
              </div>
            </div>
          ))}
        </div>
      </div>
      {modal&&<Modal onClose={()=>sModal(false)} title={t.addBill}>
        <div style={{display:'flex',flexDirection:'column',gap:11}}>
          {f.img?<div style={{position:'relative'}}><img src={f.img} alt="preview" style={{width:'100%',borderRadius:14,maxHeight:210,objectFit:'cover'}}/><button onClick={()=>sF({...f,img:null})} style={{position:'absolute',top:8,right:8,width:28,height:28,background:'rgba(0,0,0,.6)',border:'none',borderRadius:'50%',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><Ic n="x" s={13} c="#fff"/></button></div>

            <button onClick={()=>cRef.current.click()} style={{background:'var(--pl)',border:'2px dashed var(--p3)',borderRadius:14,padding:'22px 10px',cursor:'pointer',textAlign:'center',color:'var(--p2)'}}><div style={{fontSize:28,marginBottom:4}}>📷</div><div style={{fontSize:12,fontWeight:600}}>{t.photo}</div></button>
            <button onClick={()=>fRef.current.click()} style={{background:'var(--bg)',border:'2px dashed var(--bdr)',borderRadius:14,padding:'22px 10px',cursor:'pointer',textAlign:'center',color:'var(--sub)'}}><div style={{fontSize:28,marginBottom:4}}>🖼️</div><div style={{fontSize:12,fontWeight:600}}>{t.gallery}</div></button>
          </div>}
          {uploading&&<p style={{textAlign:'center',color:'var(--sub)',fontSize:13}}>प्रोसेस हुँदैछ...</p>}

          <input value={f.amount} onChange={e=>sF({...f,amount:e.target.value})} type="number" placeholder={t.billAmt} className="inp"/>
        </div>
        <input ref={cRef} type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={handleFile}/>
        <input ref={fRef} type="file" accept="image/*" style={{display:'none'}} onChange={handleFile}/>

          <button onClick={()=>sModal(false)} className="btn Bo">{t.cancel}</button>

      </Modal>}
      {prev&&<Modal onClose={()=>sPrev(null)} title={prev.description||'बिल'}>

          <img src={prev.image} alt="bill" style={{width:'100%',borderRadius:14,maxHeight:420,objectFit:'contain',background:'var(--bg)'}}/>

          <p style={{textAlign:'center',fontSize:13,color:'var(--sub)',margin:0}}>{fmtD(prev.createdAt)}</p>
          <button onClick={()=>{del(prev.id);sPrev(null);}} className="btn Br">🗑️ हटाउनुहोस्</button>
        </div>
      </Modal>}
    </div>
  );
};

/* ══ SETTINGS ═════════════════════════════════════════════════════════════════ */

            <p style={{fontSize:18,fontWeight:800,color:'#fff',margin:0}}>{uName||'User'}</p>
            <p style={{fontSize:12,color:'rgba(255,255,255,.5)',margin:'2px 0 0'}}>{user.email}</p>
            <div style={{display:'flex',alignItems:'center',gap:8,marginTop:4}}>
              <span className="bdg" style={{background:'rgba(255,255,255,.15)',color:'rgba(255,255,255,.8)',fontSize:11}}>{role==='owner'?t.owner:t.cashier}</span>
              {isPremium&&<span className="bdg" style={{background:'rgba(250,204,21,.2)',color:'#fbbf24',fontSize:11}}>⭐ Premium</span>}
            </div>
          </div>
        </div>
      </div>
      <div style={{padding:'0 14px'}}>
        {/* Shop Code */}
        <Sec title={t.shopCode}>
          <div style={{padding:'6px 0 10px'}}>
            <p style={{fontSize:12,color:'var(--sub)',margin:'0 0 6px'}}>{t.shopCode}</p>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}}>
              <p style={{fontSize:30,fontWeight:900,color:'var(--p3)',margin:0,letterSpacing:7}}>{shopData?.code}</p>
              <button onClick={copyCode} style={{background:'var(--pl)',border:'2px solid var(--p3)',borderRadius:12,padding:'8px 14px',color:'var(--p2)',fontSize:13,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',gap:6}}>
                {copied?<Ic n="check" s={14} c="var(--p2)"/>:<Ic n="copy" s={14} c="var(--p2)"/>}{copied?'✓':'Copy'}
              </button>
            </div>
            <p style={{fontSize:12,color:'var(--sub)',margin:0}}>{t.codeHint}</p>
          </div>
        </Sec>
        {/* Profile */}
        <Sec title="प्रोफाइल">
          {editN?<div style={{display:'flex',gap:8,padding:'6px 0'}}>
            <input value={uName} onChange={e=>sUName(e.target.value)} className="inp" style={{flex:1}}/>
            <button onClick={saveName} className="btn Bp" style={{width:'auto',padding:'8px 12px',fontSize:13}}>{t.save}</button>
            <button onClick={()=>sEditN(false)} className="btn Bo" style={{width:'auto',padding:'8px 10px',fontSize:13}}>✕</button>
          </div>:<Row icon="✏️" label={uName||'नाम थप्नुहोस्'} onClick={()=>sEditN(true)}/>}
        </Sec>
        {/* PIN Security */}
        <Sec title={t.pinEnabled}>
          <Row icon="🔐" label={hasPin?t.pinChange:t.pinSetup} onClick={()=>sShowPinSetup(true)}/>
          {hasPin&&<Row icon="🗑️" label={t.pinRemove} onClick={removePin} last danger/>}
          {!hasPin&&<p style={{fontSize:12,color:'var(--sub)',padding:'0 0 6px'}}>{t.roleHint}</p>}
        </Sec>
        {/* Premium */}
        {!isPremium&&<Sec title="Premium">
          <div style={{padding:'6px 0 10px'}}>
            <p style={{fontSize:13,color:'var(--sub)',margin:'0 0 10px'}}>{t.prodLimit}</p>
            <button onClick={()=>sPremModal(true)} style={{width:'100%',background:'linear-gradient(135deg,#d97706,#f59e0b)',border:'none',borderRadius:12,padding:'12px',color:'#fff',fontSize:14,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
              ⭐ {t.unlockPremium}
            </button>
          </div>
        </Sec>}
        {isPremium&&<Sec title="Premium"><Row icon="⭐" label={t.premiumActive} last right={<span className="bdg" style={{background:'#fffbeb',color:'#b45309'}}>Active</span>}/></Sec>}
        {/* Preferences */}
        <Sec title="Preferences">
          <Row icon={dark?'☀️':'🌙'} label={t.darkMode} right={<Switch on={dark} onChange={sDark}/>}/>
          <Row icon="🌐" label={t.language} last right={<button onClick={()=>sLang(lang==='ne'?'en':'ne')} style={{background:'var(--pl)',border:'none',borderRadius:10,padding:'5px 12px',color:'var(--p2)',fontSize:13,fontWeight:700,cursor:'pointer'}}>{lang==='ne'?'English':'नेपाली'}</button>}/>
        </Sec>
        {/* About */}
        <Sec title="About">
          <Row icon="🪴" label="Yoga" right={<span style={{fontSize:12,color:'var(--sub)',fontWeight:500}}>{t.v}</span>}/>
          <Row icon="⚡" label="Firebase Realtime Sync" right={<span className="bdg" style={{background:'#f0fdfa',color:'#0f766e'}}>Active</span>}/>
          <Row icon="🔒" label="Data Secure & Backed Up" last right={<span className="bdg" style={{background:'#f0fdfa',color:'#0f766e'}}>✓</span>}/>
        </Sec>
        {/* Logout */}
        <Sec title="Account">
          <Row icon="🚪" label={t.logout} onClick={onLogout} danger last/>
        </Sec>
      </div>
      {premModal&&<Modal onClose={()=>sPremModal(false)} title={t.unlockPremium}>
        <p style={{fontSize:14,color:'var(--sub)',marginBottom:12}}>Premium कोड लेख्नुहोस्:</p>
        <input value={premCode} onChange={e=>sPremCode(e.target.value)} placeholder={t.enterCode} className="inp" style={{marginBottom:14}}/>
        <button onClick={unlockPrem} disabled={premBusy} className="btn Bp" style={{background:'linear-gradient(135deg,#d97706,#f59e0b)'}}>{premBusy?'...':t.unlockPremium}</button>
      </Modal>}
    </div>
  );
};

/* ══ ADMIN PANEL ══════════════════════════════════════════════════════════════ */
const AdminPanel=({user,onLogout,onViewShop,hasShop})=>{
  const[shops,sShops]=useState([]);const[users,sUsers]=useState([]);const[busy,sBusy]=useState(null);const[sel,sSel]=useState(null);const[q,sQ]=useState('');
  useEffect(()=>{
    const r1=db.ref('shops');r1.on('value',s=>sShops(oa(s.val()).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0))));
    const r2=db.ref('users');r2.on('value',s=>sUsers(oa(s.val())));
    return()=>{r1.off();r2.off();};
  },[]);
  const toggleStatus=async shop=>{sBusy(shop.id);const n=shop.status==='suspended'?'active':'suspended';await db.ref(`shops/${shop.id}/status`).set(n);toast(n==='active'?'सक्रिय ✓':'बन्द ✓');sBusy(null);};
  const upgradePrem=async id=>{sBusy(id);await db.ref(`shops/${id}/plan`).set('premium');toast('Premium ✓');sBusy(null);};
  const filtShops=shops.filter(s=>(s.name||'').toLowerCase().includes(q.toLowerCase()));
  const trialDays=s=>s.trialStart?Math.max(0,30-Math.floor((Date.now()-s.trialStart)/864e5)):null;

  if(sel){
    const shopUsers=users.filter(u=>Object.keys(sel.members||{}).includes(u.id));const tl=trialDays(sel);
    return(
      <div style={{minHeight:'100vh',background:'var(--bg)'}}>
        <div style={{background:'linear-gradient(135deg,#1e1b4b,#4338ca)',padding:'48px 14px 20px'}}>
          <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
            <button onClick={()=>sSel(null)} style={{width:34,height:34,background:'rgba(255,255,255,.15)',border:'none',borderRadius:12,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><Ic n="back" s={17} c="#fff"/></button>
            <h1 style={{fontSize:19,fontWeight:800,color:'#fff',margin:0}}>{sel.name}</h1>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:9}}>
            {[{l:'Status',v:sel.status==='suspended'?'🔴 Suspended':'🟢 Active'},{l:'Code',v:sel.code},{l:'Members',v:Object.keys(sel.members||{}).length},{l:'Plan',v:sel.plan==='premium'?'⭐ Premium':'🆓 Free'},{l:'Trial Days',v:tl!==null?tl+' days':'∞'},{l:'Created',v:fmtD(sel.createdAt)}].map((s,i)=>(
              <div key={i} style={{background:'rgba(255,255,255,.1)',borderRadius:12,padding:'11px'}}><p style={{fontSize:11,color:'rgba(255,255,255,.5)',margin:'0 0 2px'}}>{s.l}</p><p style={{fontSize:15,fontWeight:700,color:'#fff',margin:0}}>{s.v}</p></div>
            ))}
          </div>
        </div>
        <div style={{padding:14}}>
          <div className="cd" style={{marginBottom:12}}>
            <p style={{fontSize:14,fontWeight:700,color:'var(--txt)',margin:'0 0 10px'}}>सदस्यहरू</p>
            {shopUsers.map(u=>(
              <div key={u.id} style={{display:'flex',alignItems:'center',gap:11,padding:'9px 0',borderBottom:'1px solid var(--bdr)'}}>
                <div style={{width:36,height:36,borderRadius:11,background:'var(--pl)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,color:'var(--p2)',fontSize:16}}>{(u.name||u.email||'U')[0].toUpperCase()}</div>
                <div style={{flex:1}}><p style={{fontSize:14,fontWeight:600,color:'var(--txt)',margin:0}}>{u.name||'User'}</p><p style={{fontSize:11,color:'var(--sub)',margin:'1px 0 0'}}>{u.email}</p></div>
                {u.id===sel.ownerId&&<span className="bdg" style={{background:'#fffbeb',color:'#b45309'}}>Owner</span>}
              </div>
            ))}
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:9}}>
            <button onClick={()=>toggleStatus(sel)} disabled={!!busy} style={{background:sel.status==='suspended'?'#f0fdfa':'#fef2f2',border:`2px solid ${sel.status==='suspended'?'#5eead4':'#fca5a5'}`,borderRadius:14,padding:'13px',fontWeight:700,fontSize:14,color:sel.status==='suspended'?'#0f766e':'#b91c1c',cursor:'pointer'}}>
              {busy===sel.id?'...':sel.status==='suspended'?'✓ सक्रिय गर्नुहोस्':'⛔ बन्द गर्नुहोस्'}
            </button>
            {sel.plan!=='premium'&&<button onClick={()=>upgradePrem(sel.id)} disabled={!!busy} style={{background:'linear-gradient(135deg,#d97706,#f59e0b)',border:'none',borderRadius:14,padding:'13px',fontWeight:700,fontSize:14,color:'#fff',cursor:'pointer'}}>
              ⭐ Premium बनाउनुहोस्
            </button>}
          </div>
        </div>
      </div>
    );
  }

  const activeCount=shops.filter(s=>s.status!=='suspended').length;
  return(
    <div style={{minHeight:'100vh',background:'var(--bg)'}}>
      <div style={{background:'linear-gradient(160deg,#1e1b4b,#4338ca,#6d28d9)',padding:'48px 14px 22px',position:'relative',overflow:'hidden'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:18}}>
          <div>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}><Ic n="shield" s={16} c="#c4b5fd"/><span style={{fontSize:11,color:'#c4b5fd',fontWeight:700,textTransform:'uppercase',letterSpacing:.7}}>Admin</span></div>
            <h1 style={{fontSize:22,fontWeight:900,color:'#fff',margin:0}}>Yoga Admin</h1>
            <p style={{fontSize:12,color:'rgba(255,255,255,.5)',margin:'2px 0 0'}}>{user.email}</p>
          </div>
          <div style={{display:'flex',gap:8}}>
            {hasShop&&<button onClick={onViewShop} style={{background:'rgba(255,255,255,.14)',border:'1px solid rgba(255,255,255,.22)',borderRadius:12,padding:'7px 13px',color:'#fff',fontSize:12,fontWeight:600,cursor:'pointer'}}>🏪 {T.ne.myShop}</button>}
            <button onClick={onLogout} style={{width:34,height:34,background:'rgba(255,255,255,.12)',border:'1px solid rgba(255,255,255,.18)',borderRadius:12,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><Ic n="logout" s={15} c="#fff"/></button>
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:9}}>
          {[{l:'कुल पसल',v:shops.length,icon:'🏪'},{l:'सक्रिय',v:activeCount,icon:'✅'},{l:'Users',v:users.length,icon:'👥'}].map((s,i)=>(
            <div key={i} style={{background:'rgba(255,255,255,.1)',borderRadius:13,padding:'12px',textAlign:'center'}}><div style={{fontSize:22,marginBottom:4}}>{s.icon}</div><p style={{fontSize:22,fontWeight:900,color:'#fff',margin:'0 0 2px'}}>{s.v}</p><p style={{fontSize:11,color:'rgba(255,255,255,.5)',margin:0}}>{s.l}</p></div>
          ))}
        </div>
      </div>
      <div style={{padding:'12px 14px 80px'}}>
        <input value={q} onChange={e=>sQ(e.target.value)} placeholder="पसल खोज्नुहोस्..." className="inp" style={{marginBottom:12}}/>
        {filtShops.map(shop=>{
          const tl=trialDays(shop);const sus=shop.status==='suspended';
          return(
            <div key={shop.id} className="cd" style={{marginBottom:9,borderLeft:`4px solid ${sus?'var(--red)':tl!==null&&tl<5?'var(--amber)':'var(--p3)'}`}}>
              <div style={{display:'flex',gap:11,alignItems:'flex-start',marginBottom:10}}>
                <div style={{width:42,height:42,borderRadius:13,background:sus?'#fef2f2':'var(--pl)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,flexShrink:0}}>{sus?'🔒':'🏪'}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',alignItems:'center',gap:7,flexWrap:'wrap',marginBottom:3}}>
                    <p style={{fontSize:15,fontWeight:700,color:'var(--txt)',margin:0}}>{shop.name}</p>
                    <span className="bdg" style={{background:sus?'#fef2f2':tl!==null&&tl<5?'#fffbeb':'#f0fdfa',color:sus?'#b91c1c':tl!==null&&tl<5?'#b45309':'#0f766e'}}>
                      {sus?'Suspended':tl!==null?`${tl}d trial`:'Active'}
                    </span>
                    {shop.plan==='premium'&&<span className="bdg" style={{background:'#fffbeb',color:'#b45309'}}>⭐</span>}
                  </div>
                  <p style={{fontSize:12,color:'var(--sub)',margin:'0 0 1px'}}>Code: <b style={{color:'var(--p2)',letterSpacing:2}}>{shop.code}</b> · {Object.keys(shop.members||{}).length} members</p>
                  <p style={{fontSize:11,color:'var(--sub)',margin:0}}>{fmtD(shop.createdAt)}</p>
                </div>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:7}}>
                <button onClick={()=>sSel(shop)} style={{background:'#eff6ff',border:'none',borderRadius:11,padding:'9px',fontWeight:700,fontSize:12,color:'#2563eb',cursor:'pointer'}}>विवरण</button>
                <button onClick={()=>toggleStatus(shop)} disabled={busy===shop.id} style={{background:sus?'#f0fdfa':'#fef2f2',border:'none',borderRadius:11,padding:'9px',fontWeight:700,fontSize:12,color:sus?'#0f766e':'#b91c1c',cursor:'pointer'}}>{busy===shop.id?'...':sus?'✓ Activate':'⛔ Suspend'}</button>
              </div>
            </div>
          );
        })}
        {filtShops.length===0&&<div style={{textAlign:'center',padding:'52px 0',color:'var(--sub)'}}><div style={{fontSize:52,marginBottom:12}}>🏪</div><p>कुनै पसल छैन</p></div>}
      </div>
    </div>
  );
};

/* ══ MAIN APP ═════════════════════════════════════════════════════════════════ */
const MainApp=({user,shopId,shopData,onLogout,isAdmin,onAdminPanel})=>{
  const[page,sPage]=useState('dash');const[lang,sLang]=useState(()=>localStorage.getItem('yoga_lang')||'ne');
  const[dark,sDark]=useState(()=>localStorage.getItem('yoga_dark')==='true');
  const[qTx,sQTx]=useState(null);const[pinOk,sPinOk]=useState(false);
  const hasPin=!!localStorage.getItem(`yoga_pin_${shopId}`);
  const members=shopData?.members||{};
  const memberData=members[user.uid]||{};
  // Admin email is always owner; ownerId match = owner; explicit owner role = owner
  const role=(user.email===ADMIN_EMAIL||shopData?.ownerId===user.uid||memberData.role==='owner')?'owner':'cashier';
  const t=T[lang];

  useEffect(()=>{
    if(dark)document.documentElement.setAttribute('data-dark','true');
    else document.documentElement.removeAttribute('data-dark');
    localStorage.setItem('yoga_dark',dark);
  },[dark]);
  useEffect(()=>{localStorage.setItem('yoga_lang',lang);},[lang]);

  if(hasPin&&!pinOk)return<PinLock shopId={shopId} onUnlock={()=>sPinOk(true)} t={t}/>;

  const nav=[
    {id:'dash',icon:'home',label:t.dash},
    {id:'inv',icon:'box',label:t.inv},
    {id:'tx',icon:'money',label:t.tx},
    {id:'party',icon:'users',label:t.party},
    {id:'bills',icon:'file',label:t.bills},
    {id:'rep',icon:'chart',label:t.rep},
    {id:'set',icon:'settings',label:t.set},
  ];
  const cashierNav=[
    {id:'dash',icon:'home',label:t.dash},
    {id:'tx',icon:'money',label:t.tx},
    {id:'bills',icon:'file',label:t.bills},
    {id:'set',icon:'settings',label:t.set},
  ];
  const activeNav=role==='cashier'?cashierNav:nav;

  const goQTx=type=>{sQTx(type);sPage('tx');};
  const clearQ=()=>sQTx(null);

  const pages={
    dash:<Dashboard shopId={shopId} shopData={shopData} t={t} setPage={sPage} setQTx={goQTx} lang={lang} sLang={sLang} dark={dark} sDark={sDark} onLogout={onLogout} role={role}/>,
    inv:<Inventory shopId={shopId} shopData={shopData} t={t} lang={lang}/>,
    tx:<Transactions shopId={shopId} shopData={shopData} t={t} qType={qTx} clearQ={clearQ} role={role} lang={lang}/>,
    party:<Parties shopId={shopId} t={t} lang={lang}/>,
    rep:<Reports shopId={shopId} t={t} lang={lang}/>,
    bills:<Bills shopId={shopId} t={t}/>,
    set:<Settings shopId={shopId} shopData={shopData} user={user} t={t} lang={lang} sLang={sLang} dark={dark} sDark={sDark} onLogout={onLogout} role={role} members={members}/>,
  };

  return(
    <div style={{height:'100vh',display:'flex',flexDirection:'column',background:'var(--bg)'}}>
      <div style={{flex:1,overflow:'hidden'}}>{pages[page]||pages.dash}</div>
      <div className="BN">
        {isAdmin&&<button onClick={onAdminPanel} style={{width:'100%',background:'linear-gradient(135deg,#4338ca,#6d28d9)',border:'none',padding:'6px 16px',color:'#fff',fontSize:12,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
          <Ic n="shield" s={13} c="#fff"/> Admin Panel
        </button>}
        <div style={{display:'flex'}}>
          {activeNav.map(item=>{
            const act=page===item.id;
            return(
              <button key={item.id} onClick={()=>sPage(item.id)} style={{flex:1,border:'none',background:'transparent',padding:'6px 0 9px',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
                <div style={{width:34,height:27,borderRadius:9,background:act?'var(--pl)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',transition:'background .2s'}}>
                  <Ic n={item.icon} s={18} c={act?'var(--p3)':'var(--sub)'}/>
                </div>
                <span style={{fontSize:9,fontWeight:act?700:500,color:act?'var(--p3)':'var(--sub)',lineHeight:1}}>{item.label}</span>
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
};

/* ══ ROOT ═════════════════════════════════════════════════════════════════════ */
const App=()=>{
  const[user,sUser]=useState(undefined);const[shopId,sShopId]=useState(null);const[shopData,sShopData]=useState(null);
  const[showLanding,sShowLanding]=useState(true);const[lang,sLang]=useState(()=>localStorage.getItem('yoga_lang')||'ne');
  const[adminViewShop,sAdminViewShop]=useState(false);const shopR=useRef(null);
  useEffect(()=>auth.onAuthStateChanged(async u=>{
    if(u){sUser(u);sShowLanding(false);const sn=await db.ref(`users/${u.uid}/shopId`).once('value');const sid=sn.val();if(sid)attach(sid);else sUser(u);}
    else{sUser(null);sShopId(null);sShopData(null);sAdminViewShop(false);}
  }),[]);
  const attach=useCallback(sid=>{
    if(shopR.current)shopR.current.off();sShopId(sid);
    const r=db.ref(`shops/${sid}`);shopR.current=r;
    r.on('value',s=>{if(s.exists())sShopData({id:s.key,...s.val()});});
  },[]);
  const logout=async()=>{if(shopR.current)shopR.current.off();await auth.signOut();sShopId(null);sShopData(null);sAdminViewShop(false);};
  const isAdmin=user?.email===ADMIN_EMAIL;

  if(user===undefined)return<Splash/>;
  if(showLanding&&!user)return<Landing onLogin={()=>sShowLanding(false)} lang={lang} sLang={sLang}/>;
  if(!user)return<Auth lang={lang} sLang={sLang}/>;
  if(isAdmin&&!adminViewShop)return<><AdminPanel user={user} onLogout={logout} onViewShop={()=>sAdminViewShop(true)} hasShop={!!shopId}/><ToastComp/></>;
  if(!shopId)return<ShopSetup user={user} onDone={attach} lang={lang}/>;
  if(shopData&&shopData.status==='suspended')return<SuspendedScreen onLogout={logout}/>;
  return<><MainApp user={user} shopId={shopId} shopData={shopData} onLogout={logout} isAdmin={isAdmin} onAdminPanel={()=>sAdminViewShop(false)}/><ToastComp/></>;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
if('serviceWorker' in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
</script>
