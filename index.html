<!DOCTYPE html>
<html lang="ne">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪴</text></svg>">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Yoga – Smart Business App</title>
  <meta name="theme-color" content="#0f766e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Yoga">
  <link rel="apple-touch-icon" href="/Shopwithme/icons/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div id="root">
    <!-- Initial splash shown before JS loads -->
    <div id="pre-splash" style="position:fixed;inset:0;background:linear-gradient(160deg,#042f2e,#0f766e);display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:sans-serif;">
      <div style="text-align:center;">
        <div style="font-size:64px;margin-bottom:16px;">🪴</div>
        <div style="font-size:32px;font-weight:900;color:#fff;">Yoga</div>
        <div style="font-size:13px;color:rgba(255,255,255,.5);margin-top:4px;">Smart Business App</div>
        <div style="margin-top:28px;display:flex;gap:8px;justify-content:center;">
          <div style="width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.5);animation:b 1s 0s ease infinite alternate;"></div>
          <div style="width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.5);animation:b 1s .2s ease infinite alternate;"></div>
          <div style="width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.5);animation:b 1s .4s ease infinite alternate;"></div>
        </div>
      </div>
      <style>@keyframes b{from{opacity:.2}to{opacity:1}}</style>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
