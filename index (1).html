const BS_MONTHS=['बैशाख','जेठ','असार','श्रावण','भदौ','असोज','कार्तिक','मंसिर','पुस','माघ','फाल्गुन','चैत'];
const BS_DATA={

const adToBs=(date)=>{
  try{
    const d=date instanceof Date?date:new Date(date);
    // Reference: 2024-04-13 = 2081 Chaitra 31 | 2024-04-14 = 2081 Baisakh 1
    let bsY=2080,bsM=1,bsD=1;
    let refAD=new Date(2024,3,14); // April 14 2024
    let diff=Math.floor((d-refAD)/864e5);
    if(diff<0){
      // go back
      let y=2080,m=0;
      const months=BS_DATA[y]||[31,31,32,31,31,30,30,30,29,30,30,31];
      let rem=-diff;let dy=1;let dm=m;let dyear=y;
      // simplify: approximate
      bsY=2080+Math.floor(diff/365);bsM=1;bsD=Math.abs(diff)%30||1;
    } else {
      let y=2081,m=0,dayCount=0;
      while(true){
        const months=BS_DATA[y]||[31,31,32,31,31,30,30,30,29,30,30,31];
        const daysInMonth=months[m];
        if(diff<daysInMonth-0){dayCount=diff;bsY=y;bsM=m+1;bsD=dayCount+1;break;}
        diff-=daysInMonth;m++;
        if(m>=12){m=0;y++;}
      }
    }
    return `${bsY} ${BS_MONTHS[bsM-1]} ${bsD}`;
  }catch{return '';}
};
const todayBS=()=>adToBs(new Date());

/* ══ LINE CHART ═════════════════════════════════════════════════════ */
const LineChart=({data,color='#4ade80',h=90})=>{
  if(!data||data.length<2)return(
    <div style={{height:h,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--sub)',fontSize:13}}>बिक्री डेटा छैन</div>
  );
  const max=Math.max(...data.map(d=>d.v),1);
  const W=300,H=h-20;
  const pts=data.map((d,i)=>({x:(i/(data.length-1))*W,y:H-(d.v/max)*(H-6)+3}));
  const line=pts.map((p,i)=>`${i?'L':'M'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  return(
    <svg viewBox={`0 0 ${W} ${H+20}`} style={{width:'100%',height:h}}>
      <defs><linearGradient id="lcg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity=".4"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
      <path d={`${line} L${W},${H} L0,${H} Z`} fill="url(#lcg)"/>
      <path d={line} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      {pts.map((p,i)=>(
        <g key={i}>
          <circle cx={p.x} cy={p.y} r="3.5" fill={color} stroke="var(--card)" strokeWidth="2"/>
          <text x={p.x} y={H+17} textAnchor="middle" fontSize="9" fill="var(--sub)" fontWeight="600">{data[i].label}</text>
        </g>
      ))}
    </svg>
  );
};

const OfflineBar=({t})=>{
  const[online,sOnline]=useState(navigator.onLine);
  useEffect(()=>{
    const on=()=>sOnline(true);const off=()=>sOnline(false);
    window.addEventListener('online',on);window.addEventListener('offline',off);
    return()=>{window.removeEventListener('online',on);window.removeEventListener('offline',off);};
  },[]);
  if(online)return null;
  return<div style={{background:'#b45309',color:'#fff',textAlign:'center',fontSize:12,fontWeight:600,padding:'6px',position:'fixed',top:0,left:0,right:0,zIndex:999}}>📡 {t.offline}</div>;
};

const Auth=({onLanding})=>{

  const[err,sErr]=useState('');const[busy,sBusy]=useState(false);const[lang,sLang]=useState('ne');const[fgt,sFgt]=useState(false);
  const t=T[lang];
  const go=async()=>{
    sErr('');sBusy(true);
    try{
      if(tab==='login'){await auth.signInWithEmailAndPassword(email.trim(),pass);}
      else{
        if(!name.trim()){sErr('नाम आवश्यक');sBusy(false);return;}
        if(pass.length<6){sErr('पासवर्ड कम्तिमा ६ अक्षर');sBusy(false);return;}
        const cr=await auth.createUserWithEmailAndPassword(email.trim(),pass);
        await db.ref(`users/${cr.user.uid}`).set({name:name.trim(),email:email.trim(),createdAt:now()});
      }
    }catch(e){
      const em=e.code;
      sErr(['auth/user-not-found','auth/wrong-password','auth/invalid-credential'].includes(em)?'इमेल वा पासवर्ड गलत छ':
        em==='auth/email-already-in-use'?'यो इमेल पहिले दर्ता भएको छ':em==='auth/invalid-email'?'इमेल ठेगाना गलत':

const PinLock=({savedPin,onUnlock,shopName})=>{
  const[pin,sPin]=useState('');const[err,sErr]=useState('');
  const press=n=>{if(pin.length>=4)return;const np=pin+n;sPin(np);if(np.length===4){if(np===savedPin){onUnlock();}else{sErr('गलत PIN');setTimeout(()=>{sPin('');sErr('');},700);}}};
  const del=()=>sPin(p=>p.slice(0,-1));
  return(
    <div style={{minHeight:'100vh',background:'linear-gradient(160deg,#052e16,#166534)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24}}>
      <div style={{textAlign:'center',marginBottom:36}}>
        <div style={{width:80,height:80,background:'rgba(255,255,255,.1)',borderRadius:24,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 14px',border:'1px solid rgba(255,255,255,.18)'}}>
          <Ic n="lock" s={36} c="rgba(255,255,255,.9)"/>
        </div>
        <h2 style={{fontSize:22,fontWeight:800,color:'#fff',margin:'0 0 4px'}}>{shopName}</h2>
        <p style={{fontSize:14,color:'rgba(255,255,255,.55)',margin:0}}>PIN लेख्नुहोस्</p>
      </div>
      {/* Dots */}
      <div style={{display:'flex',gap:14,marginBottom:12}}>
        {[0,1,2,3].map(i=><div key={i} className="pin-dot" style={{background:pin.length>i?'var(--p3)':'transparent'}}/>)}
      </div>
      {err&&<p style={{color:'#f87171',fontSize:13,fontWeight:600,marginBottom:8,height:20}}>{err}</p>}
      {!err&&<div style={{height:28}}/>}
      {/* Keypad */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,72px)',gap:14}}>
        {['1','2','3','4','5','6','7','8','9','','0','⌫'].map((k,i)=>(
          k===''?<div key={i}/>:
          <button key={i} onClick={()=>k==='⌫'?del():press(k)} className="pin-btn">
            {k}
          </button>
        ))}
      </div>
    </div>
  );
};

/* ══ SHOP SETUP ══════════════════════════════════════════════════════ */
const ShopSetup=({user,onDone})=>{
  const[mode,sMode]=useState(null);const[sName,sSName]=useState('');const[code,sCode]=useState('');const[err,sErr]=useState('');const[busy,sBusy]=useState(false);
  const create=async()=>{
    if(!sName.trim())return sErr('नाम आवश्यक');sBusy(true);sErr('');
    try{
      const c=genCode();const r=db.ref('shops').push();
      await r.set({name:sName.trim(),code:c,ownerId:user.uid,members:{[user.uid]:{role:'owner'}},status:'active',plan:'free',trialStart:now(),invoiceCounter:0,createdAt:now()});
      await db.ref(`users/${user.uid}/shopId`).set(r.key);onDone(r.key);
    }catch(e){sErr(e.message);}sBusy(false);
  };
  const join=async()=>{
    if(!code.trim())return sErr('कोड आवश्यक');sBusy(true);sErr('');
    try{
      const snap=await db.ref('shops').orderByChild('code').equalTo(code.trim().toUpperCase()).once('value');
      if(!snap.exists()){sErr('पसल फेला परेन');sBusy(false);return;}
      const k=Object.keys(snap.val())[0];const shop=snap.val()[k];
      if(shop.status==='suspended'){sErr('यो पसल निलम्बित छ');sBusy(false);return;}
      await db.ref(`shops/${k}/members/${user.uid}`).set({role:'cashier'});
      await db.ref(`users/${user.uid}/shopId`).set(k);onDone(k);
    }catch(e){sErr(e.message);}sBusy(false);
  };
  return(
    <div style={{minHeight:'100vh',background:'linear-gradient(160deg,#052e16,#166534)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:16}}>
      <div style={{width:'100%',maxWidth:380}}>
        <div style={{textAlign:'center',marginBottom:24}}><span style={{fontSize:56}}>🏪</span><div style={{fontSize:24,fontWeight:800,color:'#fff',marginTop:10}}>{!mode?'पसल सेटअप':mode==='create'?'नयाँ पसल':'पसलमा जोडिनुहोस्'}</div></div>
        <div style={{background:'var(--card)',borderRadius:26,padding:22,boxShadow:'0 30px 80px rgba(0,0,0,.35)'}}>
          {!mode?(<div style={{display:'flex',flexDirection:'column',gap:12}}>
            <button onClick={()=>sMode('create')} className="btn Bp" style={{fontSize:16,padding:'16px'}}><span style={{fontSize:22}}>✨</span>नयाँ पसल बनाउनुहोस्</button>
            <button onClick={()=>sMode('join')} className="btn Bo" style={{fontSize:16,padding:'16px'}}><span style={{fontSize:22}}>🔗</span>पसलमा जोडिनुहोस्</button>
          </div>):mode==='create'?(<div style={{display:'flex',flexDirection:'column',gap:12}}>
            <input value={sName} onChange={e=>sSName(e.target.value)} placeholder="पसलको नाम" className="inp" onKeyDown={e=>e.key==='Enter'&&create()}/>
            {err&&<p style={{color:'var(--red)',fontSize:13,margin:0}}>{err}</p>}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}><button onClick={()=>sMode(null)} className="btn Bo">रद्द</button><button onClick={create} disabled={busy} className="btn Bp">{busy?'...':'बनाउनुहोस्'}</button></div>
          </div>):(<div style={{display:'flex',flexDirection:'column',gap:12}}>
            <input value={code} onChange={e=>sCode(e.target.value.toUpperCase())} placeholder="XXXXXX" className="inp" style={{textAlign:'center',fontSize:26,fontWeight:900,letterSpacing:8}} maxLength={6}/>
            {err&&<p style={{color:'var(--red)',fontSize:13,margin:0,textAlign:'center'}}>{err}</p>}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}><button onClick={()=>sMode(null)} className="btn Bo">रद्द</button><button onClick={join} disabled={busy} className="btn Bp">{busy?'...':'जोडिनुहोस्'}</button></div>
          </div>)}
        </div>
      </div>
    </div>
  );
};

/* ══ TX MODAL ════════════════════════════════════════════════════════ */
const TxModal=({shopId,shopData,t,onClose,defaultType='sale',isPremium})=>{
  const[prods,sProds]=useState([]);const[parties,sParties]=useState([]);
  const[f,sF]=useState({type:defaultType,amount:'',desc:'',prodId:'',qty:'1',partyId:'',isCredit:false,payMethod:'cash',addVat:false});
  const[busy,sBusy]=useState(false);const[invoice,sInvoice]=useState(null);
  useEffect(()=>{
    db.ref(`shops/${shopId}/inventory`).once('value',s=>sProds(oa(s.val()).sort((a,b)=>(a.name||'').localeCompare(b.name||''))));
    db.ref(`shops/${shopId}/parties`).once('value',s=>sParties(oa(s.val()).sort((a,b)=>(a.name||'').localeCompare(b.name||''))));
  },[shopId]);
  const subtotal=parseFloat(f.amount)||0;
  const vatAmt=f.addVat?Math.round(subtotal*0.13):0;
  const total=subtotal+vatAmt;
  const save=async()=>{
    if(!subtotal||subtotal<=0)return;sBusy(true);
    const qty=parseFloat(f.qty)||1;
    // Get next invoice number
    let invNo=1;
    if(f.type==='sale'){
      const snap=await db.ref(`shops/${shopId}/invoiceCounter`).once('value');
      invNo=(snap.val()||0)+1;
      await db.ref(`shops/${shopId}/invoiceCounter`).set(invNo);
    }
    const prod=prods.find(p=>p.id===f.prodId);
    const party=parties.find(p=>p.id===f.partyId);
    const txData={type:f.type,amount:total,subtotal,vatAmt,description:f.desc||t[f.type],productId:f.prodId||null,quantity:qty,partyId:(f.isCredit&&f.partyId)?f.partyId:null,payMethod:f.payMethod,invoiceNo:f.type==='sale'?invNo:null,createdAt:now()};
    await db.ref(`shops/${shopId}/transactions`).push(txData);
    // Stock update
    if(f.prodId){const delta=f.type==='sale'?-qty:f.type==='purch'?qty:0;if(delta!==0){const sn=await db.ref(`shops/${shopId}/inventory/${f.prodId}/stock`).once('value');await db.ref(`shops/${shopId}/inventory/${f.prodId}/stock`).set((sn.val()||0)+delta);}}
    // Party balance for credit
    if(f.isCredit&&f.partyId){
      const sn=await db.ref(`shops/${shopId}/parties/${f.partyId}/balance`).once('value');
      await db.ref(`shops/${shopId}/parties/${f.partyId}/balance`).set((sn.val()||0)+(f.type==='sale'?total:-total));
      await db.ref(`shops/${shopId}/ledger`).push({partyId:f.partyId,type:f.type==='sale'?'receivable':'payable',amount:total,description:f.desc||t[f.type],createdAt:now()});
    }
    toast(f.type==='sale'?'बिक्री थपियो ✓':f.type==='purch'?'खरिद थपियो ✓':'खर्च थपियो ✓');
    // Show invoice for sale
    if(f.type==='sale'&&isPremium){
      sInvoice({
        items:[{name:prod?.name||f.desc||'Item',qty,amount:total}],
        subtotal,vatAmt,total,payMethod:f.payMethod,
        partyName:party?.name||'',invoiceNo:invNo,date:now()
      });
    } else {sBusy(false);onClose();}
    sBusy(false);
  };
  if(invoice)return<InvoiceView invoice={invoice} shopData={shopData} onClose={onClose} t={t}/>;
  const TC={sale:{b:'#dcfce7',c:'var(--p3)'},purch:{b:'#dbeafe',c:'var(--blue)'},exp:{b:'#fee2e2',c:'var(--red)'}};
  const payMethods=['cash','esewa','khalti','card','qr'];
  return(
    <Modal onClose={onClose} title={t.addTx}>
      <div style={{display:'flex',gap:8,marginBottom:14}}>
        {[['sale',t.sale],['purch',t.purch],['exp',t.exp]].map(([tp,lb])=>{
          const a=f.type===tp,tc=TC[tp];
          return<button key={tp} onClick={()=>sF({...f,type:tp})} style={{flex:1,padding:'11px 4px',borderRadius:12,border:`2px solid ${a?tc.c:'var(--bdr)'}`,fontWeight:700,fontSize:13,cursor:'pointer',background:a?tc.b:'transparent',color:a?tc.c:'var(--sub)',transition:'all .15s'}}>{lb}</button>;
        })}
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:11}}>
        <input value={f.amount} onChange={e=>sF({...f,amount:e.target.value})} type="number" placeholder={t.amount} className="inp"/>
        <input value={f.desc} onChange={e=>sF({...f,desc:e.target.value})} placeholder={t.desc} className="inp"/>
        <select value={f.prodId} onChange={e=>{const p=prods.find(x=>x.id===e.target.value);sF({...f,prodId:e.target.value,amount:p&&!f.amount?String(p.sellP||0):f.amount,desc:p&&!f.desc?p.name:f.desc});}} className="inp">
          <option value="">{t.selProd}</option>
          {prods.map(p=><option key={p.id} value={p.id}>{p.name} ({p.stock||0} {t[p.unit]||p.unit})</option>)}
        </select>
        {f.prodId&&<input value={f.qty} onChange={e=>{const q=parseFloat(e.target.value)||1;const p=prods.find(x=>x.id===f.prodId);sF({...f,qty:e.target.value,amount:p?String((p.sellP||0)*q):f.amount});}} type="number" placeholder={t.qty} min="1" className="inp"/>}
        {/* Payment method */}
        {f.type==='sale'&&<>
          <p style={{fontSize:12,fontWeight:600,color:'var(--sub)',margin:0}}>{t.payMethod}</p>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {payMethods.map(pm=><button key={pm} onClick={()=>sF({...f,payMethod:pm})} style={{padding:'6px 14px',borderRadius:20,border:`2px solid ${f.payMethod===pm?'var(--p3)':'var(--bdr)'}`,background:f.payMethod===pm?'var(--pl)':'transparent',color:f.payMethod===pm?'var(--p3)':'var(--sub)',fontSize:12,fontWeight:600,cursor:'pointer'}}>{t[pm]}</button>)}
          </div>
          {/* VAT */}
          <label style={{display:'flex',alignItems:'center',gap:12,cursor:'pointer'}}>
            <Switch on={f.addVat} onChange={v=>sF({...f,addVat:v})}/>
            <span style={{fontSize:14,fontWeight:600,color:'var(--txt)'}}>{t.vat}</span>
          </label>
          {f.addVat&&<div style={{background:'var(--pl)',borderRadius:12,padding:'10px 14px',fontSize:13}}>
            <div style={{display:'flex',justifyContent:'space-between'}}><span>Subtotal</span><span style={{fontWeight:700}}>{fmt(subtotal)}</span></div>
            <div style={{display:'flex',justifyContent:'space-between'}}><span>VAT 13%</span><span style={{fontWeight:700,color:'var(--red)'}}>{fmt(vatAmt)}</span></div>
            <div style={{display:'flex',justifyContent:'space-between',borderTop:'1px solid var(--bdr)',marginTop:6,paddingTop:6}}><span style={{fontWeight:700}}>जम्मा</span><span style={{fontWeight:800,color:'var(--p3)'}}>{fmt(total)}</span></div>
          </div>}
          {/* Credit */}
          <label style={{display:'flex',alignItems:'center',gap:12,cursor:'pointer'}}>
            <Switch on={f.isCredit} onChange={v=>sF({...f,isCredit:v})}/>
            <span style={{fontSize:14,fontWeight:600,color:'var(--txt)'}}>{t.credit} (उधारो)</span>
          </label>
          {f.isCredit&&<select value={f.partyId} onChange={e=>sF({...f,partyId:e.target.value})} className="inp">
            <option value="">{t.selParty}</option>
            {parties.filter(p=>p.type==='customer').map(p=><option key={p.id} value={p.id}>{p.name}{p.balance?` — ${fmt(Math.abs(p.balance))}`:''}</option>)}
          </select>}
        </>}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginTop:18}}>
        <button onClick={onClose} className="btn Bo">{t.cancel}</button>
        <button onClick={save} disabled={busy} className="btn Bp">{busy?'...':t.save}</button>
      </div>
    </Modal>
  );
};

/* ══ INVENTORY ═══════════════════════════════════════════════════════ */
const Inventory=({shopId,t,isPremium,invCount})=>{
  const[items,sItems]=useState([]);const[q,sQ]=useState('');const[catF,sCatF]=useState('all');const[modal,sModal]=useState(false);const[editing,sEditing]=useState(null);const[busy,sBusy]=useState(false);
  const blank={name:'',cat:'other',unit:'pcs',buyP:'',sellP:'',stock:'',minStk:'5'};const[f,sF]=useState(blank);
  useEffect(()=>{const r=db.ref(`shops/${shopId}/inventory`);r.on('value',s=>sItems(oa(s.val()).sort((a,b)=>(a.name||'').localeCompare(b.name||''))));return()=>r.off();},[shopId]);
  const cats=['all','veg','fruit','grain','dairy','snack','bev','other'];
  const CE={veg:'🥬',fruit:'🍎',grain:'🌾',dairy:'🥛',snack:'🍪',bev:'🧃',other:'📦',all:'🏪'};
  const filtered=items.filter(p=>(p.name||'').toLowerCase().includes(q.toLowerCase())&&(catF==='all'||p.cat===catF));
  const openAdd=()=>{
    if(!isPremium&&invCount>=FREE_PROD_LIMIT){toast(`निःशुल्क सीमा ${FREE_PROD_LIMIT} सामान — प्रिमियम अपग्रेड गर्नुहोस्`);return;}
    sF(blank);sEditing(null);sModal(true);
  };
  const openEdit=p=>{sF({name:p.name||'',cat:p.cat||'other',unit:p.unit||'pcs',buyP:String(p.buyP||0),sellP:String(p.sellP||0),stock:String(p.stock||0),minStk:String(p.minStk||5)});sEditing(p);sModal(true);};
  const save=async()=>{
    if(!f.name.trim())return;sBusy(true);
    const d={name:f.name.trim(),cat:f.cat,unit:f.unit,buyP:parseFloat(f.buyP)||0,sellP:parseFloat(f.sellP)||0,stock:parseFloat(f.stock)||0,minStk:parseFloat(f.minStk)||5,updatedAt:now()};
    if(editing)await db.ref(`shops/${shopId}/inventory/${editing.id}`).update(d);
    else await db.ref(`shops/${shopId}/inventory`).push({...d,createdAt:now()});
    toast(editing?'अपडेट ✓':'थपियो ✓');sBusy(false);sModal(false);
  };
  const del=async id=>{if(window.confirm('हटाउने?')){await db.ref(`shops/${shopId}/inventory/${id}`).remove();toast('हटाइयो');}};
  const margin=p=>p.sellP>0?Math.round(((p.sellP-p.buyP)/p.sellP)*100):0;
  return(
    <div className="FI" style={{height:'100%',display:'flex',flexDirection:'column'}}>
      <div style={{padding:'48px 14px 12px',background:'var(--card)',borderBottom:'1px solid var(--bdr)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <div>
            <h1 style={{fontSize:21,fontWeight:800,color:'var(--txt)',margin:0}}>📦 {t.inv}</h1>
            {!isPremium&&<p style={{fontSize:11,color:'var(--amber)',margin:'2px 0 0',fontWeight:600}}>{invCount}/{FREE_PROD_LIMIT} {t.prodLimit}</p>}
          </div>
          <button onClick={openAdd} style={{background:'var(--p3)',border:'none',borderRadius:14,padding:'9px 16px',color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',gap:6}}><Ic n="plus" s={14} c="#fff"/> {t.add}</button>
        </div>
        <input value={q} onChange={e=>sQ(e.target.value)} placeholder={t.search} className="inp" style={{marginBottom:10}}/>
        <div style={{display:'flex',gap:7,overflowX:'auto',paddingBottom:2}}>
          {cats.map(c=><button key={c} onClick={()=>sCatF(c)} className="pil" style={{borderColor:catF===c?'var(--p3)':'var(--bdr)',background:catF===c?'var(--p3)':'transparent',color:catF===c?'#fff':'var(--sub)'}}>{CE[c]} {c==='all'?'सबै':t[c]||c}</button>)}
        </div>
      </div>
      <div className="S" style={{flex:1,padding:'12px 14px',paddingBottom:80}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:12}}>
          {[{l:'कुल',v:items.length,c:'var(--p3)'},{l:'कम स्टक',v:items.filter(p=>(p.stock||0)<=(p.minStk||0)).length,c:'var(--red)'},{l:'मूल्य',v:fmts(items.reduce((s,p)=>s+(p.stock||0)*(p.sellP||0),0)),c:'var(--blue)'}].map((s,i)=>(
            <div key={i} style={{background:'var(--card)',border:'1px solid var(--bdr)',borderRadius:14,padding:'10px',textAlign:'center',boxShadow:'var(--sh)'}}>
              <p style={{fontSize:14,fontWeight:800,color:s.c,margin:0}}>{s.v}</p>
              <p style={{fontSize:10,color:'var(--sub)',margin:'2px 0 0',fontWeight:500}}>{s.l}</p>
            </div>
          ))}
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:9}}>
          {filtered.map(p=>{
            const low=(p.stock||0)<=(p.minStk||0);const m=margin(p);
            return(
              <div key={p.id} className="cd" style={{borderLeft:`4px solid ${low?'var(--red)':'var(--p3)'}`,padding:'13px 14px'}}>
                <div style={{display:'flex',gap:11,alignItems:'flex-start'}}>
                  <div style={{width:42,height:42,borderRadius:14,background:low?'#fee2e2':'var(--pl)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:21,flexShrink:0}}>{CE[p.cat]||'📦'}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:'flex',alignItems:'center',gap:7,flexWrap:'wrap',marginBottom:4}}>
                      <p style={{fontSize:15,fontWeight:700,color:'var(--txt)',margin:0}}>{p.name}</p>
                      <span className="bdg" style={{background:low?'#fee2e2':'#dcfce7',color:low?'#b91c1c':'#15803d'}}>{p.stock||0} {t[p.unit]||p.unit}</span>
                      {m>0&&<span className="bdg" style={{background:'#dbeafe',color:'#1d4ed8'}}>{m}%</span>}
                    </div>
                    <div style={{display:'flex',gap:14}}>
                      <span style={{fontSize:12,color:'var(--sub)'}}>किन्ने: <b style={{color:'var(--txt)'}}>{fmt(p.buyP||0)}</b></span>
                      <span style={{fontSize:12,color:'var(--sub)'}}>बेच्ने: <b style={{color:'var(--p3)'}}>{fmt(p.sellP||0)}</b></span>
                    </div>
                  </div>
                  <div style={{display:'flex',gap:7}}>
                    <button onClick={()=>openEdit(p)} style={{width:30,height:30,background:'#dbeafe',border:'none',borderRadius:10,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><Ic n="edit" s={13} c="#2563eb"/></button>
                    <button onClick={()=>del(p.id)} style={{width:30,height:30,background:'#fee2e2',border:'none',borderRadius:10,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><Ic n="trash" s={13} c="#dc2626"/></button>
                  </div>
                </div>
              </div>
            );
          })}
          {filtered.length===0&&<div style={{textAlign:'center',padding:'52px 0',color:'var(--sub)'}}><div style={{fontSize:52,marginBottom:12}}>📦</div><p style={{fontSize:15,margin:0}}>{t.noData}</p></div>}
        </div>
      </div>
      {modal&&<Modal onClose={()=>sModal(false)} title={editing?t.edit:t.addProd}>
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <input value={f.name} onChange={e=>sF({...f,name:e.target.value})} placeholder={t.prodName} className="inp"/>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <select value={f.cat} onChange={e=>sF({...f,cat:e.target.value})} className="inp">{['veg','fruit','grain','dairy','snack','bev','other'].map(c=><option key={c} value={c}>{CE[c]} {t[c]||c}</option>)}</select>
            <select value={f.unit} onChange={e=>sF({...f,unit:e.target.value})} className="inp">{['pcs','kg','gm','ltr'].map(u=><option key={u} value={u}>{t[u]}</option>)}</select>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <div><label style={{fontSize:12,color:'var(--sub)',fontWeight:600,display:'block',marginBottom:4}}>{t.buyP}</label><input value={f.buyP} onChange={e=>sF({...f,buyP:e.target.value})} type="number" placeholder="0" className="inp"/></div>
            <div><label style={{fontSize:12,color:'var(--sub)',fontWeight:600,display:'block',marginBottom:4}}>{t.sellP}</label><input value={f.sellP} onChange={e=>sF({...f,sellP:e.target.value})} type="number" placeholder="0" className="inp"/></div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <div><label style={{fontSize:12,color:'var(--sub)',fontWeight:600,display:'block',marginBottom:4}}>{t.stock}</label><input value={f.stock} onChange={e=>sF({...f,stock:e.target.value})} type="number" placeholder="0" className="inp"/></div>
            <div><label style={{fontSize:12,color:'var(--sub)',fontWeight:600,display:'block',marginBottom:4}}>{t.minStk}</label><input value={f.minStk} onChange={e=>sF({...f,minStk:e.target.value})} type="number" placeholder="5" className="inp"/></div>
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginTop:18}}>
          <button onClick={()=>sModal(false)} className="btn Bo">{t.cancel}</button>
          <button onClick={save} disabled={busy} className="btn Bp">{busy?'...':t.save}</button>
        </div>
      </Modal>}
    </div>
  );

/* ══ TRANSACTIONS ════════════════════════════════════════════════════ */
const Transactions=({shopId,shopData,t,qType,clearQ,isPremium})=>{
  const[txs,sTxs]=useState([]);const[prods,sProds]=useState([]);const[parties,sParties]=useState([]);
  const[typeF,sTypeF]=useState('all');const[period,sPeriod]=useState('all');const[modal,sModal]=useState(!!qType);
  useEffect(()=>{if(qType)sModal(true);},[qType]);

    const r1=db.ref(`shops/${shopId}/transactions`);r1.on('value',s=>sTxs(oa(s.val()).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0))));
    db.ref(`shops/${shopId}/inventory`).once('value',s=>sProds(oa(s.val())));
    db.ref(`shops/${shopId}/parties`).once('value',s=>sParties(oa(s.val())));

  },[shopId]);
  const filtered=txs.filter(x=>{
    const mT=typeF==='all'||x.type===typeF;

    return mT&&mP;
  });
  const tots={sale:filtered.filter(x=>x.type==='sale').reduce((s,x)=>s+(x.amount||0),0),purch:filtered.filter(x=>x.type==='purch').reduce((s,x)=>s+(x.amount||0),0),exp:filtered.filter(x=>x.type==='exp').reduce((s,x)=>s+(x.amount||0),0)};
  const profit=tots.sale-tots.purch-tots.exp;
  const TC={sale:{bg:'#dcfce7',ic:'💰',c:'#15803d'},purch:{bg:'#dbeafe',ic:'📦',c:'#1d4ed8'},exp:{bg:'#fee2e2',ic:'💸',c:'#b91c1c'}};
  return(
    <div className="FI" style={{height:'100%',display:'flex',flexDirection:'column'}}>
      <div style={{padding:'48px 14px 12px',background:'var(--card)',borderBottom:'1px solid var(--bdr)'}}>

          <h1 style={{fontSize:21,fontWeight:800,color:'var(--txt)',margin:0}}>💳 {t.tx}</h1>
          <button onClick={()=>{clearQ&&clearQ();sModal(true);}} style={{background:'var(--p3)',border:'none',borderRadius:14,padding:'9px 16px',color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',gap:6}}><Ic n="plus" s={14} c="#fff"/> {t.add}</button>
        </div>
        <div style={{display:'flex',gap:7,marginBottom:8,overflowX:'auto'}}>
          {[['all',t.all],['today',t.today],['week',t.week],['month',t.month]].map(([v,l])=><button key={v} onClick={()=>sPeriod(v)} className="pil" style={{borderColor:period===v?'#374151':'var(--bdr)',background:period===v?'#374151':'transparent',color:period===v?'#fff':'var(--sub)'}}>{l}</button>)}
        </div>
        <div style={{display:'flex',gap:7,overflowX:'auto'}}>
          {[['all','सबै'],['sale',t.sale],['purch',t.purch],['exp',t.exp]].map(([v,l])=><button key={v} onClick={()=>sTypeF(v)} className="pil" style={{borderColor:typeF===v?'var(--p3)':'var(--bdr)',background:typeF===v?'var(--p3)':'transparent',color:typeF===v?'#fff':'var(--sub)'}}>{l}</button>)}
        </div>
      </div>
      <div className="S" style={{flex:1,padding:'12px 14px',paddingBottom:80}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:9,marginBottom:14}}>
          {[{l:t.totalSales,v:fmt(tots.sale),c:'#15803d',bg:'#dcfce7'},{l:t.netProfit,v:fmt(profit),c:profit>=0?'#059669':'#dc2626',bg:profit>=0?'#d1fae5':'#fee2e2'},{l:t.totalPurch,v:fmt(tots.purch),c:'#1d4ed8',bg:'#dbeafe'},{l:t.totalExp,v:fmt(tots.exp),c:'#b45309',bg:'#fef3c7'}].map((s,i)=>(

  );
};

/* ══ PARTIES ══════════════════════════════════════════════════════════ */
const Parties=({shopId,t})=>{
  const[parties,sParties]=useState([]);const[ledger,sLedger]=useState([]);const[txs,sTxs]=useState([]);
  const[q,sQ]=useState('');const[tab,sTab]=useState('customer');const[sel,sSel]=useState(null);
  const[addModal,sAddModal]=useState(false);const[txModal,sTxModal]=useState(null);
  const[cf,sCf]=useState({name:'',type:'customer',phone:'',addr:''});const[tf,sTf]=useState({amount:'',desc:''});const[busy,sBusy]=useState(false);
  useEffect(()=>{
    const r1=db.ref(`shops/${shopId}/parties`);r1.on('value',s=>sParties(oa(s.val()).sort((a,b)=>(a.name||'').localeCompare(b.name||''))));
    const r2=db.ref(`shops/${shopId}/ledger`);r2.on('value',s=>sLedger(oa(s.val()).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0))));
    const r3=db.ref(`shops/${shopId}/transactions`);r3.on('value',s=>sTxs(oa(s.val())));
    return()=>{r1.off();r2.off();r3.off();};
  },[shopId]);
  const filtered=parties.filter(p=>p.type===tab&&((p.name||'').toLowerCase().includes(q.toLowerCase())||(p.phone||'').includes(q)));
  const selP=sel?parties.find(p=>p.id===sel.id)||sel:null;
  const selL=sel?ledger.filter(l=>l.partyId===sel.id):[];
  const selTxs=sel?txs.filter(x=>x.partyId===sel.id):[];
  const totalRec=parties.filter(p=>p.type==='customer'&&(p.balance||0)>0).reduce((s,p)=>s+(p.balance||0),0);

  const addParty=async()=>{if(!cf.name.trim())return;sBusy(true);await db.ref(`shops/${shopId}/parties`).push({name:cf.name.trim(),type:cf.type,phone:cf.phone,addr:cf.addr,balance:0,createdAt:now()});toast('थपियो ✓');sBusy(false);sAddModal(false);sCf({name:'',type:'customer',phone:'',addr:''});};
  const doTx=async()=>{
    if(!tf.amount||!sel)return;sBusy(true);
    const amt=parseFloat(tf.amount);const isCred=txModal==='cred';
    const sn=await db.ref(`shops/${shopId}/parties/${sel.id}/balance`).once('value');
    const delta=selP.type==='customer'?(isCred?amt:-amt):(isCred?-amt:amt);
    await db.ref(`shops/${shopId}/parties/${sel.id}/balance`).set((sn.val()||0)+delta);
    await db.ref(`shops/${shopId}/ledger`).push({partyId:sel.id,type:txModal,amount:amt,description:tf.desc||(isCred?'उधारो':'भुक्तानी'),createdAt:now()});
    // Also log transaction
    await db.ref(`shops/${shopId}/transactions`).push({type:isCred?'sale':'purch',amount:amt,description:tf.desc||(isCred?'उधारो':'भुक्तानी'),partyId:sel.id,payMethod:'cash',createdAt:now()});
    toast(isCred?'उधारो थपियो ✓':'भुक्तानी थपियो ✓');sBusy(false);sTxModal(null);sTf({amount:'',desc:''});
  };
  const sendWA=p=>{
    const bal=Math.abs(p.balance||0);
    const msg=`नमस्ते ${p.name}! ${p.balance>0?`तपाईंले रु.${bal.toLocaleString('en-IN')} Yoga पसल प्रबन्धकमा दिनु छ।`:`हामीले तपाईंलाई रु.${bal.toLocaleString('en-IN')} दिनु छ।`}\n\nआज: ${fmtD(now())} (${adToBs(new Date())})\n\nधन्यवाद! 🙏`;
    window.open(`https://wa.me/${(p.phone||'').replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`,'_blank');
  };

  if(sel&&selP)return(
    <div className="FI" style={{height:'100%',display:'flex',flexDirection:'column'}}>
      <div style={{padding:'48px 16px 16px',background:'var(--card)',borderBottom:'1px solid var(--bdr)'}}>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <button onClick={()=>sSel(null)} style={{width:36,height:36,background:'var(--bg)',border:'1px solid var(--bdr)',borderRadius:12,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><Ic n="back" s={18} c="var(--txt)"/></button>
          <div style={{flex:1}}>
            <h1 style={{fontSize:20,fontWeight:800,color:'var(--txt)',margin:0}}>{selP.name}</h1>
            <p style={{fontSize:12,color:'var(--sub)',margin:'2px 0 0'}}>{selP.type==='customer'?t.customer:t.supplier}{selP.phone?` · ${selP.phone}`:''}</p>
          </div>
          {selP.phone&&<button onClick={()=>sendWA(selP)} style={{width:38,height:38,background:'#dcfce7',border:'none',borderRadius:12,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><Ic n="wa" s={20} c="#25d366"/></button>}
        </div>
      </div>
      <div className="S" style={{flex:1,padding:16,paddingBottom:80}}>
        <div style={{background:`linear-gradient(135deg,${selP.balance>0?'#7f1d1d,#dc2626':selP.balance<0?'#052e16,#166534':'#1f2937,#374151'})`,borderRadius:22,padding:'22px',marginBottom:14,boxShadow:`0 8px 32px ${selP.balance>0?'rgba(220,38,38,.3)':selP.balance<0?'rgba(22,163,74,.3)':'rgba(0,0,0,.2)'}`}}>
          <p style={{fontSize:12,color:'rgba(255,255,255,.6)',margin:'0 0 4px'}}>{t.bal}</p>
          <p style={{fontSize:38,fontWeight:900,color:'#fff',margin:'0 0 6px',lineHeight:1}}>{fmt(Math.abs(selP.balance||0))}</p>
          <p style={{fontSize:14,color:'rgba(255,255,255,.7)',margin:0}}>
            {selP.balance===0?t.settled:selP.type==='customer'?(selP.balance>0?`${selP.name} ${t.owesYou}`:t.youOwe):(selP.balance<0?`${selP.name} ${t.owesYou}`:t.youOwe)}
          </p>
          <p style={{fontSize:11,color:'rgba(255,255,255,.4)',margin:'6px 0 0'}}>{adToBs(new Date())}</p>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}}>
          <button onClick={()=>sTxModal('cred')} style={{background:'#fee2e2',border:'2px solid #fca5a5',borderRadius:16,padding:'14px',cursor:'pointer',fontWeight:700,fontSize:14,color:'#b91c1c',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>↑ {t.addCred}</button>
          <button onClick={()=>sTxModal('pay')} style={{background:'#dcfce7',border:'2px solid #86efac',borderRadius:16,padding:'14px',cursor:'pointer',fontWeight:700,fontSize:14,color:'#15803d',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>✓ {t.addPay}</button>
        </div>
        {/* Purchase history */}
        {selTxs.length>0&&<div style={{marginBottom:14}}>
          <p style={{fontSize:13,fontWeight:700,color:'var(--txt)',margin:'0 0 8px'}}>{t.purchaseHistory} ({selTxs.length})</p>
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            {selTxs.slice(0,3).map(tx=>(
              <div key={tx.id} style={{display:'flex',justifyContent:'space-between',padding:'8px 12px',background:'var(--bg)',borderRadius:12}}>
                <span style={{fontSize:13,color:'var(--txt)',fontWeight:500}}>{tx.description}</span>
                <span style={{fontSize:13,fontWeight:700,color:'var(--p3)'}}>{fmt(tx.amount)}</span>
              </div>
            ))}
          </div>
        </div>}
        <p style={{fontSize:14,fontWeight:700,color:'var(--txt)',margin:'0 0 10px'}}>{t.ledger} ({selL.length})</p>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {selL.map(l=>(
            <div key={l.id} className="cd" style={{padding:'11px 14px',display:'flex',gap:11,alignItems:'center'}}>
              <div style={{width:34,height:34,borderRadius:11,background:l.type==='cred'?'#fee2e2':'#dcfce7',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:15,color:l.type==='cred'?'#b91c1c':'#15803d',flexShrink:0}}>{l.type==='cred'?'↑':'↓'}</div>
              <div style={{flex:1}}>
                <p style={{fontSize:14,fontWeight:600,color:'var(--txt)',margin:0}}>{l.description}</p>
                <p style={{fontSize:11,color:'var(--sub)',margin:'2px 0 0'}}>{fmtD(l.createdAt)} · {adToBs(new Date(l.createdAt))}</p>
              </div>
              <p style={{fontSize:14,fontWeight:800,color:l.type==='cred'?'#dc2626':'#16a34a',margin:0}}>{l.type==='cred'?'+':'-'}{fmt(l.amount)}</p>
            </div>
          ))}
          {selL.length===0&&<div style={{textAlign:'center',padding:'28px 0',color:'var(--sub)'}}><p style={{fontSize:14,margin:0}}>{t.noData}</p></div>}
        </div>
      </div>
      {txModal&&<Modal onClose={()=>sTxModal(null)} title={txModal==='cred'?t.addCred:t.addPay}>
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <input value={tf.amount} onChange={e=>sTf({...tf,amount:e.target.value})} type="number" placeholder={t.amount} className="inp"/>
          <input value={tf.desc} onChange={e=>sTf({...tf,desc:e.target.value})} placeholder={t.desc} className="inp"/>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginTop:18}}>
          <button onClick={()=>sTxModal(null)} className="btn Bo">{t.cancel}</button>
          <button onClick={doTx} disabled={busy} className="btn Bp">{busy?'...':t.save}</button>
        </div>
      </Modal>}
    </div>
  );

  return(
    <div className="FI" style={{height:'100%',display:'flex',flexDirection:'column'}}>
      <div style={{padding:'48px 14px 12px',background:'var(--card)',borderBottom:'1px solid var(--bdr)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <h1 style={{fontSize:21,fontWeight:800,color:'var(--txt)',margin:0}}>👥 {t.party}</h1>
          <button onClick={()=>sAddModal(true)} style={{background:'var(--p3)',border:'none',borderRadius:14,padding:'9px 16px',color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',gap:6}}><Ic n="plus" s={14} c="#fff"/> {t.add}</button>
        </div>
        <div style={{display:'flex',background:'var(--bg)',borderRadius:14,padding:3,marginBottom:10}}>
          {['customer','supplier'].map(tp=><button key={tp} onClick={()=>sTab(tp)} style={{flex:1,padding:'9px',borderRadius:11,border:'none',fontWeight:700,fontSize:13,cursor:'pointer',background:tab===tp?'var(--card)':'transparent',color:tab===tp?'var(--txt)':'var(--sub)',boxShadow:tab===tp?'var(--sh)':'none',transition:'all .2s'}}>{tp==='customer'?`👤 ${t.customer}`:`🏭 ${t.supplier}`}</button>)}
        </div>
        <input value={q} onChange={e=>sQ(e.target.value)} placeholder={t.search} className="inp"/>
        {tab==='customer'&&totalRec>0&&<div style={{background:'linear-gradient(135deg,#4c1d95,#7c3aed)',borderRadius:14,padding:'12px 16px',marginTop:10,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div><p style={{fontSize:11,color:'rgba(255,255,255,.6)',margin:'0 0 2px'}}>जम्मा उधारो बाँकी</p><p style={{fontSize:20,fontWeight:900,color:'#fff',margin:0}}>{fmt(totalRec)}</p></div>
          <span style={{fontSize:24}}>💜</span>
        </div>}
      </div>
      <div className="S" style={{flex:1,padding:'12px 14px',paddingBottom:80}}>
        {filtered.length===0&&<div style={{textAlign:'center',padding:'52px 0',color:'var(--sub)'}}><div style={{fontSize:52,marginBottom:12}}>👥</div><p style={{fontSize:15,margin:0}}>{t.noParties}</p></div>}

            <div key={p.id} className="cd" style={{padding:'13px 14px',display:'flex',gap:11,alignItems:'center',cursor:'pointer'}} onClick={()=>sSel(p)}>
              <div style={{width:46,height:46,borderRadius:16,background:'linear-gradient(135deg,var(--p2),var(--p3))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,fontWeight:800,color:'#fff',flexShrink:0}}>
                {(p.name||'?')[0].toUpperCase()}

                <p style={{fontSize:12,color:'var(--sub)',margin:'2px 0 0'}}>{p.phone||p.addr||'—'}</p>
              </div>
              <div style={{textAlign:'right',flexShrink:0}}>
                {p.balance!==0?<>
                  <p style={{fontSize:15,fontWeight:800,color:p.balance>0?'#dc2626':'#16a34a',margin:0}}>{fmt(Math.abs(p.balance||0))}</p>
                  <p style={{fontSize:10,fontWeight:600,color:p.balance>0?'#dc2626':'#16a34a',margin:'2px 0 0'}}>{p.balance>0?'उधारो':'Credit'}</p>
                </>:<p style={{fontSize:12,color:'var(--sub)',margin:0,fontWeight:600}}>{t.settled}</p>}
              </div>
              <Ic n="right" s={15} c="var(--sub)"/>
            </div>
          ))}
        </div>
      </div>
      {addModal&&<Modal onClose={()=>sAddModal(false)} title={t.addParty}>
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <div style={{display:'flex',background:'var(--bg)',borderRadius:12,padding:3}}>
            {['customer','supplier'].map(tp=><button key={tp} onClick={()=>sCf({...cf,type:tp})} style={{flex:1,padding:'9px',borderRadius:9,border:'none',fontWeight:700,fontSize:13,cursor:'pointer',background:cf.type===tp?'var(--card)':'transparent',color:cf.type===tp?'var(--txt)':'var(--sub)'}}>{tp==='customer'?t.customer:t.supplier}</button>)}
          </div>
          <input value={cf.name} onChange={e=>sCf({...cf,name:e.target.value})} placeholder={t.partyName} className="inp"/>
          <input value={cf.phone} onChange={e=>sCf({...cf,phone:e.target.value})} placeholder={t.phone} type="tel" className="inp"/>
          <input value={cf.addr} onChange={e=>sCf({...cf,addr:e.target.value})} placeholder={t.addr} className="inp"/>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginTop:18}}>
          <button onClick={()=>sAddModal(false)} className="btn Bo">{t.cancel}</button>
          <button onClick={addParty} disabled={busy} className="btn Bp">{busy?'...':t.add}</button>
        </div>
      </Modal>}
    </div>
  );
};

/* ══ REPORTS ═════════════════════════════════════════════════════════ */
const Reports=({shopId,t})=>{
  const[txs,sTxs]=useState([]);const[inv,sInv]=useState([]);const[period,sPeriod]=useState('month');
  useEffect(()=>{
    const r1=db.ref(`shops/${shopId}/transactions`);r1.on('value',s=>sTxs(oa(s.val())));
    const r2=db.ref(`shops/${shopId}/inventory`);r2.on('value',s=>sInv(oa(s.val())));
    return()=>{r1.off();r2.off();};
  },[shopId]);
  const filt=txs.filter(x=>period==='all'?true:period==='today'?isToday(x.createdAt):period==='week'?inDays(x.createdAt,7):inMonth(x.createdAt));
  const sales=filt.filter(x=>x.type==='sale').reduce((s,x)=>s+(x.amount||0),0);
  const purch=filt.filter(x=>x.type==='purch').reduce((s,x)=>s+(x.amount||0),0);
  const exp=filt.filter(x=>x.type==='exp').reduce((s,x)=>s+(x.amount||0),0);
  const profit=sales-purch-exp;
  const chartData=useMemo(()=>{const days=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const v=txs.filter(x=>x.type==='sale'&&x.createdAt&&new Date(x.createdAt).toDateString()===d.toDateString()).reduce((s,x)=>s+(x.amount||0),0);days.push({label:dayL(d.getDay()),v});}return days;},[txs]);
  // Best sellers
  const productSales={};txs.filter(x=>x.type==='sale'&&x.productId).forEach(tx=>{const p=inv.find(i=>i.id===tx.productId);if(p){productSales[tx.productId]=(productSales[tx.productId]||0)+(tx.amount||0);}});
  const bestSellers=Object.entries(productSales).map(([id,total])=>({id,name:inv.find(i=>i.id===id)?.name||id,total})).sort((a,b)=>b.total-a.total).slice(0,5);
  // Payment methods
  const payBreakdown={};filt.filter(x=>x.type==='sale').forEach(tx=>{const m=tx.payMethod||'cash';payBreakdown[m]=(payBreakdown[m]||0)+(tx.amount||0);});

  return(
    <div className="FI" style={{height:'100%',display:'flex',flexDirection:'column'}}>
      <div style={{padding:'48px 14px 12px',background:'var(--card)',borderBottom:'1px solid var(--bdr)'}}>
        <h1 style={{fontSize:21,fontWeight:800,color:'var(--txt)',margin:'0 0 12px'}}>📊 {t.rep}</h1>
        <div style={{display:'flex',gap:7,overflowX:'auto'}}>
          {[['today',t.today],['week',t.week],['month',t.month],['all',t.all]].map(([v,l])=><button key={v} onClick={()=>sPeriod(v)} className="pil" style={{borderColor:period===v?'var(--p3)':'var(--bdr)',background:period===v?'var(--p3)':'transparent',color:period===v?'#fff':'var(--sub)'}}>{l}</button>)}
        </div>
      </div>
      <div className="S" style={{flex:1,padding:'12px 14px',paddingBottom:80}}>
        {/* P&L */}
        <div style={{background:`linear-gradient(135deg,${profit>=0?'#052e16,#166534':'#7f1d1d,#dc2626'})`,borderRadius:22,padding:'22px',marginBottom:14,boxShadow:`0 8px 28px ${profit>=0?'rgba(22,163,74,.3)':'rgba(220,38,38,.3)'}`}}>
          <p style={{fontSize:12,color:'rgba(255,255,255,.55)',margin:'0 0 5px'}}>{t.netProfit}</p>
          <p style={{fontSize:38,fontWeight:900,color:'#fff',margin:'0 0 10px',lineHeight:1}}>{fmt(Math.abs(profit))}</p>
          <p style={{fontSize:13,color:'rgba(255,255,255,.5)',margin:0}}>{t.today_bs}: {todayBS()}</p>
          <div style={{display:'flex',gap:20,marginTop:10}}>
            <span style={{fontSize:13,color:'rgba(255,255,255,.65)'}}>📈 <b style={{color:'#4ade80'}}>{fmts(sales)}</b></span>
            <span style={{fontSize:13,color:'rgba(255,255,255,.65)'}}>📦 <b style={{color:'#f87171'}}>{fmts(purch)}</b></span>
            <span style={{fontSize:13,color:'rgba(255,255,255,.65)'}}>💸 <b style={{color:'#fbbf24'}}>{fmts(exp)}</b></span>
          </div>
        </div>
        {/* Grid */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:9,marginBottom:14}}>
          {[{l:t.totalSales,v:fmt(sales),c:'#15803d',bg:'#dcfce7',icon:'💰'},{l:t.totalPurch,v:fmt(purch),c:'#1d4ed8',bg:'#dbeafe',icon:'📦'},{l:t.totalExp,v:fmt(exp),c:'#b45309',bg:'#fef3c7',icon:'💸'},{l:'Gross Margin',v:sales>0?`${Math.round(((sales-purch)/sales)*100)}%`:'0%',c:'#6d28d9',bg:'#ede9fe',icon:'📊'}].map((s,i)=>(
            <div key={i} style={{background:s.bg,borderRadius:16,padding:'14px'}}>
              <span style={{fontSize:22}}>{s.icon}</span>
              <p style={{fontSize:15,fontWeight:800,color:s.c,margin:'6px 0 2px'}}>{s.v}</p>
              <p style={{fontSize:11,color:s.c,margin:0,opacity:.8,fontWeight:500}}>{s.l}</p>
            </div>
          ))}
        </div>
        {/* Chart */}
        <div className="cd" style={{marginBottom:14}}>

/* ══ BILLS ════════════════════════════════════════════════════════════ */

            <button onClick={()=>fRef.current.click()} style={{background:'var(--bg)',border:'2px dashed var(--bdr)',borderRadius:14,padding:'22px 10px',cursor:'pointer',textAlign:'center',color:'var(--sub)'}}><div style={{fontSize:30,marginBottom:5}}>🖼️</div><div style={{fontSize:12,fontWeight:600}}>{t.gallery}</div></button>

const Settings=({shopId,shopData,user,t,lang,sLang,dark,sDark,onLogout,isPremium,sIsPremium,userRole})=>{
  const[copied,sCopied]=useState(false);const[uName,sUName]=useState('');const[editN,sEditN]=useState(false);
  const[pinModal,sPinModal]=useState(false);const[newPin,sNewPin]=useState('');const[confirmPin,sConfirmPin]=useState(false);const[pin1,sPin1]=useState('');
  const[premModal,sPremModal]=useState(false);const[premCode,sPremCode]=useState('');

  useEffect(()=>{db.ref(`users/${user.uid}/name`).once('value',s=>sUName(s.val()||''));},[user]);
  const copyCode=()=>{navigator.clipboard.writeText(shopData?.code||'').catch(()=>{});sCopied(true);setTimeout(()=>sCopied(false),2500);toast('कोड कपी भयो ✓');};
  const saveName=async()=>{if(!uName.trim())return;await db.ref(`users/${user.uid}/name`).set(uName.trim());toast('नाम अपडेट ✓');sEditN(false);};
  const activatePremium=async()=>{
    if(premCode.trim()===PREMIUM_CODE){
      await db.ref(`shops/${shopId}/plan`).set('premium');
      sIsPremium(true);toast('प्रिमियम सक्रिय भयो 🎉');sPremModal(false);sPremCode('');
    }else{toast('गलत कोड');}
  };
  const savePin=async()=>{
    if(newPin.length===4){
      if(!confirmPin){sPin1(newPin);sNewPin('');sConfirmPin(true);}
      else{
        if(newPin===pin1){await db.ref(`shops/${shopId}/pin`).set(newPin);toast(t.pinSet);sPinModal(false);sNewPin('');sConfirmPin(false);sPin1('');}
        else{toast(t.wrongPin);sNewPin('');sConfirmPin(false);sPin1('');}
      }
    }
  };
  const pressPin=n=>{if(newPin.length>=4)return;const np=newPin+n;sNewPin(np);if(np.length===4)setTimeout(()=>{if(!confirmPin){sPin1(np);sNewPin('');sConfirmPin(true);}else{if(np===pin1){db.ref(`shops/${shopId}/pin`).set(pin1);toast(t.pinSet);sPinModal(false);sNewPin('');sConfirmPin(false);sPin1('');}else{toast(t.wrongPin);sNewPin('');sConfirmPin(false);sPin1('');}},100);};

  const R=({icon,label,right,onClick,danger,last})=>(
    <button onClick={onClick} style={{width:'100%',background:'transparent',border:'none',padding:'14px 0',cursor:onClick?'pointer':'default',display:'flex',alignItems:'center',gap:14,borderBottom:last?'none':'1px solid var(--bdr)'}}>
      <div style={{width:38,height:38,borderRadius:12,background:danger?'#fee2e2':'var(--pl)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:18}}>{icon}</div>
      <span style={{flex:1,fontSize:15,fontWeight:600,color:danger?'var(--red)':'var(--txt)',textAlign:'left'}}>{label}</span>

    </button>

    <div style={{marginTop:20}}>
      <p style={{fontSize:11,fontWeight:700,color:'var(--sub)',textTransform:'uppercase',letterSpacing:.7,margin:'0 0 8px'}}>{title}</p>
      <div className="cd">{children}</div>
    </div>
  );
  return(
    <div className="FI S" style={{height:'100%',paddingBottom:80}}>
      <div style={{background:'linear-gradient(160deg,#052e16,#14532d,#166534)',padding:'48px 20px 28px'}}>
        <div style={{display:'flex',gap:16,alignItems:'center'}}>
          <div style={{width:62,height:62,borderRadius:20,background:'rgba(255,255,255,.14)',border:'2px solid rgba(255,255,255,.22)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:26,fontWeight:900,color:'#fff'}}>{(uName||'U')[0].toUpperCase()}</div>
          <div>
            <p style={{fontSize:19,fontWeight:800,color:'#fff',margin:0}}>{uName||'User'}</p>
            <p style={{fontSize:12,color:'rgba(255,255,255,.5)',margin:'2px 0 0'}}>{user.email}</p>
            <div style={{display:'flex',gap:6,marginTop:4}}>
              <span style={{background:isPremium?'linear-gradient(135deg,#f59e0b,#d97706)':'rgba(255,255,255,.15)',color:'#fff',fontSize:11,fontWeight:700,padding:'2px 10px',borderRadius:20}}>{isPremium?'💎 Premium':'🆓 Free'}</span>
              <span style={{background:'rgba(255,255,255,.15)',color:'rgba(255,255,255,.8)',fontSize:11,fontWeight:700,padding:'2px 10px',borderRadius:20}}>{userRole==='owner'?'👑 Owner':'💼 Cashier'}</span>
            </div>
          </div>
        </div>
      </div>
      <div style={{padding:'0 16px'}}>
        {/* Shop code */}
        <Sec title="पसल कोड">
          <div style={{padding:'6px 0 10px'}}>
            <p style={{fontSize:12,color:'var(--sub)',margin:'0 0 6px'}}>{t.shopCode}</p>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}}>
              <p style={{fontSize:30,fontWeight:900,color:'var(--p3)',margin:0,letterSpacing:7}}>{shopData?.code}</p>
              <button onClick={copyCode} style={{background:'var(--pl)',border:'2px solid var(--p3)',borderRadius:12,padding:'8px 16px',color:'var(--p3)',fontSize:13,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',gap:6}}>
                {copied?<Ic n="check" s={14} c="var(--p3)"/>:<Ic n="copy" s={14} c="var(--p3)"/>}{copied?'✓':'Copy'}
              </button>
            </div>
            <p style={{fontSize:12,color:'var(--sub)',margin:0}}>{t.codeHint}</p>
          </div>
        </Sec>
        {/* Premium */}
        {!isPremium&&<Sec title="💎 Premium">
          <div style={{padding:'6px 0'}}>
            <p style={{fontSize:14,color:'var(--txt)',margin:'0 0 4px',fontWeight:600}}>प्रिमियम अपग्रेड गर्नुहोस्</p>
            <p style={{fontSize:12,color:'var(--sub)',margin:'0 0 12px'}}>VAT इनभ्वाइस · WhatsApp शेयर · असीमित सामान</p>
            <button onClick={()=>sPremModal(true)} className="btn Bp" style={{fontSize:14}}>💎 प्रिमियम कोड सक्रिय गर्नुहोस्</button>
          </div>
        </Sec>}
        {/* Security */}
        {userRole==='owner'&&<Sec title="सुरक्षा">
          <R icon="🔐" label={t.pinLock} onClick={()=>sPinModal(true)} last/>
        </Sec>}
        {/* Profile */}
        <Sec title="प्रोफाइल">
          {editN?<div style={{display:'flex',gap:8,padding:'6px 0'}}><input value={uName} onChange={e=>sUName(e.target.value)} className="inp" style={{flex:1}}/><button onClick={saveName} className="btn Bp" style={{width:'auto',padding:'8px 14px',fontSize:13}}>{t.save}</button><button onClick={()=>sEditN(false)} className="btn Bo" style={{width:'auto',padding:'8px 12px',fontSize:13}}>{t.cancel}</button></div>
          :<R icon="✏️" label={uName||'नाम थप्नुहोस्'} onClick={()=>sEditN(true)}/>}
        </Sec>
        <Sec title="Preferences">
          <R icon={dark?'☀️':'🌙'} label={t.darkMode} right={<Switch on={dark} onChange={sDark}/>}/>
          <R icon="🌐" label={t.language} last right={<button onClick={()=>sLang(lang==='ne'?'en':'ne')} style={{background:'var(--pl)',border:'none',borderRadius:10,padding:'5px 14px',color:'var(--p3)',fontSize:13,fontWeight:700,cursor:'pointer'}}>{lang==='ne'?'English':'नेपाली'}</button>}/>
        </Sec>
        <Sec title="About">
          <R icon="🧘" label="Yoga" right={<span style={{fontSize:12,color:'var(--sub)',fontWeight:500}}>{t.v}</span>}/>
          <R icon="⚡" label="Firebase Realtime Sync" right={<span className="bdg" style={{background:'#dcfce7',color:'#15803d'}}>Active</span>}/>
          <R icon="🇳🇵" label="Made in Nepal" last right={<span style={{fontSize:14}}>🙏</span>}/>
        </Sec>
        <Sec title="Account">
          <R icon="🚪" label={t.logout} onClick={onLogout} danger last/>
        </Sec>
      </div>
      {/* PIN Modal */}
      {pinModal&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.7)',zIndex:900,display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
        <div style={{background:'var(--card)',borderRadius:24,padding:'28px 24px',width:'100%',maxWidth:340,textAlign:'center'}}>
          <p style={{fontSize:20,fontWeight:800,color:'var(--txt)',margin:'0 0 8px'}}>{t.setPin}</p>
          <p style={{fontSize:13,color:'var(--sub)',margin:'0 0 20px'}}>{confirmPin?'PIN दोहोर्याउनुहोस्':'नयाँ ४ अंकको PIN'}</p>
          <div style={{display:'flex',gap:12,justifyContent:'center',marginBottom:12}}>
            {[0,1,2,3].map(i=><div key={i} className="pin-dot" style={{background:newPin.length>i?'var(--p3)':'transparent'}}/>)}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,margin:'20px auto 0',width:'fit-content'}}>
            {['1','2','3','4','5','6','7','8','9','','0','⌫'].map((k,i)=>k===''?<div key={i}/>:
              <button key={i} onClick={()=>k==='⌫'?sNewPin(p=>p.slice(0,-1)):pressPin(k)} className="pin-btn">{k}</button>
            )}

          <button onClick={()=>{sPinModal(false);sNewPin('');sConfirmPin(false);sPin1('');}} className="btn Bo" style={{marginTop:20,fontSize:13}}>{t.cancel}</button>

        <p style={{fontSize:14,color:'var(--sub)',margin:'0 0 14px'}}>प्रिमियम कोड लेख्नुहोस्। yogesh लाई सम्पर्क गर्नुहोस्।</p>
        <input value={premCode} onChange={e=>sPremCode(e.target.value)} placeholder="YOGA2025" className="inp" style={{marginBottom:14}}/>
        <button onClick={activatePremium} className="btn Bp">💎 {t.activatePremium}</button>
      </Modal>}
    </div>
  );

              <div key={shop.id} className="cd" style={{borderLeft:`4px solid ${suspended?'var(--red)':trialDays!==null&&trialDays<5?'var(--amber)':'var(--p3)'}`}}>
                <div style={{display:'flex',gap:11,alignItems:'flex-start',marginBottom:10}}>
                  <div style={{width:42,height:42,borderRadius:13,background:suspended?'#fee2e2':'var(--pl)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>{suspended?'🔒':'🏪'}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:'flex',alignItems:'center',gap:7,flexWrap:'wrap',marginBottom:3}}>
                      <p style={{fontSize:15,fontWeight:700,color:'var(--txt)',margin:0}}>{shop.name}</p>
                      <span className="bdg" style={{background:suspended?'#fee2e2':trialDays!==null&&trialDays<5?'#fef3c7':'#dcfce7',color:suspended?'#b91c1c':trialDays!==null&&trialDays<5?'#b45309':'#15803d',fontSize:10}}>
                        {suspended?'Suspended':trialDays!==null?`${trialDays}d trial`:'Active'}
                      </span>
                      <span className="bdg" style={{background:'#ede9fe',color:'#6d28d9',fontSize:10}}>{shop.plan||'free'}</span>
                    </div>
                    <p style={{fontSize:12,color:'var(--sub)',margin:'0 0 2px'}}>Code: <b style={{color:'var(--p3)',letterSpacing:2}}>{shop.code}</b></p>
                    <p style={{fontSize:11,color:'var(--sub)',margin:0}}>{memberCount} सदस्य · {fmtD(shop.createdAt)}</p>
                    <p style={{fontSize:11,color:'var(--sub)',margin:'2px 0 0'}}>मालिक: {shopUsers.find(u=>u.id===shop.ownerId)?.email||'—'}</p>
                  </div>
                </div>
                <button onClick={()=>toggle(shop)} disabled={busy===shop.id} style={{width:'100%',background:suspended?'#dcfce7':'#fee2e2',border:'none',borderRadius:12,padding:'10px',fontWeight:700,fontSize:13,color:suspended?'#15803d':'#b91c1c',cursor:'pointer'}}>
                  {busy===shop.id?'...':`${suspended?'✓ सक्रिय गर्नुहोस्':'⛔ बन्द गर्नुहोस्'}`}
                </button>
              </div>
            );
          })}
          {shops.length===0&&<div style={{textAlign:'center',padding:'52px 0',color:'var(--sub)'}}><div style={{fontSize:52,marginBottom:12}}>🏪</div><p>कुनै पसल छैन</p></div>}
        </div>
      </div>
    </div>
  );
};

/* ══ SUSPENDED ════════════════════════════════════════════════════════ */
const Suspended=({onLogout})=>(
  <div style={{minHeight:'100vh',background:'var(--bg)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24,textAlign:'center'}}>
    <div style={{fontSize:60,marginBottom:16}}>🔒</div>
    <h2 style={{fontSize:22,fontWeight:800,color:'var(--txt)',margin:'0 0 8px'}}>पसल निलम्बित</h2>
    <p style={{fontSize:15,color:'var(--sub)',margin:'0 0 24px',lineHeight:1.6}}>तपाईंको पसल Admin द्वारा निलम्बित गरिएको छ।<br/>कृपया Admin सँग सम्पर्क गर्नुहोस्।</p>
    <button onClick={()=>window.open('https://wa.me/?text=Yoga App पसल निलम्बित। मद्दत चाहियो।','_blank')} style={{background:'#25d366',border:'none',borderRadius:14,padding:'12px 24px',color:'#fff',fontSize:14,fontWeight:700,cursor:'pointer',marginBottom:12,display:'flex',alignItems:'center',gap:8}}><Ic n="wa" s={16} c="#fff"/> Admin सम्पर्क</button>
    <button onClick={onLogout} className="btn Bo" style={{width:'auto',padding:'10px 24px'}}>लगआउट</button>
  </div>
);

/* ══ MAIN APP ══════════════════════════════════════════════════════════ */
const MainApp=({user,shopId,shopData,onLogout,isAdmin,onAdminPanel,userRole,initPremium})=>{
  const[page,sPage]=useState('dash');const[lang,sLang]=useState('ne');const[dark,sDark]=useState(false);const[qTx,sQTx]=useState(null);const[isPremium,sIsPremium]=useState(initPremium);
  const t=T[lang];
  const[inv,sInv]=useState([]);
  useEffect(()=>{db.ref(`shops/${shopId}/inventory`).on('value',s=>sInv(oa(s.val())));return()=>db.ref(`shops/${shopId}/inventory`).off();},[shopId]);

  useEffect(()=>{
    if(dark){document.documentElement.setAttribute('data-dark','true');}
    else{document.documentElement.removeAttribute('data-dark');}
  },[dark]);

  const nav=[
    {id:'dash',icon:'home',label:t.dash},
    {id:'inv',icon:'box',label:t.inv},
    {id:'tx',icon:'money',label:t.tx},
    {id:'party',icon:'users',label:t.party},
    {id:'rep',icon:'chart',label:t.rep},
    {id:'bills',icon:'file',label:t.bills},
    {id:'set',icon:'settings',label:t.set},
  ];
  const goQTx=type=>{sQTx(type);sPage('tx');};
  const clearQ=()=>sQTx(null);
  const pages={
    dash:<Dashboard shopId={shopId} shopData={shopData} t={t} setPage={sPage} setQTx={goQTx} lang={lang} sLang={sLang} dark={dark} sDark={sDark} isPremium={isPremium}/>,
    inv:<Inventory shopId={shopId} t={t} isPremium={isPremium} invCount={inv.length}/>,
    tx:<Transactions shopId={shopId} shopData={shopData} t={t} qType={qTx} clearQ={clearQ} isPremium={isPremium}/>,
    party:<Parties shopId={shopId} t={t}/>,
    rep:<Reports shopId={shopId} t={t}/>,
    bills:<Bills shopId={shopId} t={t}/>,
    set:<Settings shopId={shopId} shopData={shopData} user={user} t={t} lang={lang} sLang={sLang} dark={dark} sDark={sDark} onLogout={onLogout} isPremium={isPremium} sIsPremium={sIsPremium} userRole={userRole}/>,
  };
  // Cashier restricted pages
  const cashierPages=['dash','tx','party'];
  const activePage=(userRole==='cashier'&&!cashierPages.includes(page))?'dash':page;
  const visibleNav=userRole==='cashier'?nav.filter(n=>cashierPages.includes(n.id)):nav;

  return(
    <div style={{height:'100vh',display:'flex',flexDirection:'column',background:'var(--bg)'}}>
      <OfflineBar t={t}/>
      <div style={{flex:1,overflow:'hidden'}}>{pages[activePage]||pages.dash}</div>
      <div className="BN">
        {isAdmin&&<button onClick={onAdminPanel} style={{width:'100%',background:'linear-gradient(135deg,#4338ca,#6d28d9)',border:'none',padding:'6px',color:'#fff',fontSize:11,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
          <Ic n="shield" s={12} c="#fff"/> Admin Panel
        </button>}
        <div style={{display:'flex'}}>
          {visibleNav.map(item=>{
            const act=activePage===item.id;
            return(
              <button key={item.id} onClick={()=>sPage(item.id)} style={{flex:1,border:'none',background:'transparent',padding:'6px 0 8px',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:1}}>
                <div style={{width:32,height:27,borderRadius:9,background:act?'var(--pl)':'transparent',display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <Ic n={item.icon} s={18} c={act?'var(--p3)':'var(--sub)'}/>
                </div>
                <span style={{fontSize:9,fontWeight:act?700:500,color:act?'var(--p3)':'var(--sub)',lineHeight:1}}>{item.label}</span>
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
};

/* ══ ROOT ══════════════════════════════════════════════════════════════ */
const App=()=>{
  const[user,sUser]=useState(undefined);const[shopId,sShopId]=useState(null);const[shopData,sShopData]=useState(null);const[landing,sLanding]=useState(true);
  const[adminViewShop,sAdminViewShop]=useState(false);const[pinUnlocked,sPinUnlocked]=useState(false);
  const[savedPin,sSavedPin]=useState(null);const[userRole,sUserRole]=useState('owner');const[isPremium,sIsPremium]=useState(false);
  const shopR=useRef(null);

  useEffect(()=>auth.onAuthStateChanged(async u=>{
    if(u){
      sUser(u);sLanding(false);
      const sn=await db.ref(`users/${u.uid}/shopId`).once('value');
      const sid=sn.val();if(sid)attach(sid);else sUser(u);
    }else{sUser(null);sShopId(null);sShopData(null);}
  }),[]);

  const attach=useCallback(sid=>{
    if(shopR.current)shopR.current.off();sShopId(sid);
    const r=db.ref(`shops/${sid}`);shopR.current=r;
    r.on('value',async s=>{
      if(s.exists()){
        const data={id:s.key,...s.val()};sShopData(data);
        sSavedPin(data.pin||null);
        sIsPremium(data.plan==='premium');
        // Get user role
        const uid=auth.currentUser?.uid;
        if(uid){const memberSnap=await db.ref(`shops/${sid}/members/${uid}`).once('value');const memberData=memberSnap.val();sUserRole(typeof memberData==='object'?memberData.role||'cashier':'owner');}
      }
    });
  },[]);

  const logout=async()=>{if(shopR.current)shopR.current.off();await auth.signOut();sShopId(null);sShopData(null);sPinUnlocked(false);sAdminViewShop(false);};
  const isAdmin=user?.email===ADMIN_EMAIL;

  if(user===undefined)return<Splash/>;
  if(landing&&!user)return<Landing onLogin={()=>sLanding(false)}/>;
  if(!user)return<Auth onLanding={()=>sLanding(true)}/>;
  if(isAdmin&&!adminViewShop)return<><AdminPanel user={user} onLogout={logout} onViewShop={()=>sAdminViewShop(true)} hasShop={!!shopId}/><ToastEl/></>;
  if(!shopId)return<ShopSetup user={user} onDone={attach}/>;
  if(shopData?.status==='suspended')return<Suspended onLogout={logout}/>;
  // PIN check
  if(savedPin&&!pinUnlocked)return<PinLock savedPin={savedPin} onUnlock={()=>sPinUnlocked(true)} shopName={shopData?.name||'Yoga'}/>;
  return<><MainApp user={user} shopId={shopId} shopData={shopData} onLogout={logout} isAdmin={isAdmin} onAdminPanel={()=>sAdminViewShop(false)} userRole={userRole} initPremium={isPremium}/><ToastEl/></>;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
if('serviceWorker' in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
</script>
</body>
</html>
